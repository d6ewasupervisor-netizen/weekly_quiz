<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P02W3 Weekly Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:16px}
.container{max-width:640px;margin:0 auto}
.header{text-align:center;padding:24px 0 16px}
.header h1{font-family:'Space Mono',monospace;font-size:1.4rem;color:#0891b2;margin-bottom:4px}
.header p{font-size:0.85rem;color:#94a3b8}
.progress-bar{width:100%;height:6px;background:#1e293b;border-radius:3px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#0891b2,#f59e0b);border-radius:3px;transition:width 0.4s ease}
.name-field{margin-bottom:24px}
.name-field label{font-family:'Space Mono',monospace;font-size:0.75rem;color:#0891b2;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px}
.name-field input{width:100%;padding:10px 14px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-family:'DM Sans',sans-serif;font-size:1rem;outline:none}
.name-field input:focus{border-color:#0891b2}
.question-card{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #334155}
.question-card.correct{border-color:#22c55e}
.question-card.wrong{border-color:#dc2626}
.q-number{font-family:'Space Mono',monospace;font-size:0.7rem;color:#0891b2;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.q-text{font-size:0.95rem;font-weight:500;line-height:1.5;margin-bottom:14px;color:#f1f5f9}
.option{display:flex;align-items:center;padding:10px 14px;margin-bottom:8px;background:#0f172a;border:1px solid #334155;border-radius:8px;cursor:pointer;transition:all 0.2s}
.option:hover{border-color:#0891b2}
.option.selected{border-color:#0891b2;background:#0c4a6e}
.option.locked{pointer-events:none}
.option.show-correct{border-color:#22c55e;background:#14532d}
.option.show-wrong{border-color:#dc2626;background:#450a0a;text-decoration:line-through;opacity:0.7}
.option input{display:none}
.option .letter{font-family:'Space Mono',monospace;font-size:0.75rem;font-weight:700;color:#0891b2;margin-right:12px;min-width:18px}
.option .label{font-size:0.9rem;line-height:1.4}
.feedback{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:0.85rem;line-height:1.5;display:none}
.feedback.correct-fb{background:#14532d;color:#86efac;display:block}
.feedback.wrong-fb{background:#450a0a;color:#fca5a5;display:block}
.submit-btn{width:100%;padding:14px;background:#0891b2;color:#fff;font-family:'Space Mono',monospace;font-size:0.95rem;font-weight:700;border:none;border-radius:10px;cursor:pointer;margin-top:8px;text-transform:uppercase;letter-spacing:1px;transition:all 0.2s}
.submit-btn:disabled{background:#334155;color:#64748b;cursor:not-allowed}
.submit-btn:not(:disabled):hover{background:#0e7490}
.result-box{text-align:center;padding:24px;background:#1e293b;border-radius:12px;margin-top:16px;border:1px solid #334155;display:none}
.result-box .score{font-family:'Space Mono',monospace;font-size:2.4rem;font-weight:700;color:#0891b2}
.result-box .verdict{font-size:1rem;margin-top:8px;color:#f1f5f9}
.result-box .sub-note{font-size:0.8rem;color:#94a3b8;margin-top:8px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>P02W3 Quiz</h1>
<p>Period 2 &bull; Week 3 &bull; 10 Questions</p>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="name-field">
<label>Your Name</label>
<input type="text" id="nameInput" placeholder="Enter your name">
</div>
<div id="quizBody"></div>
<button class="submit-btn" id="submitBtn" disabled>Submit Quiz</button>
<div class="result-box" id="resultBox">
<div class="score" id="scoreDisplay"></div>
<div class="verdict" id="verdictDisplay"></div>
<div class="sub-note" id="subNote"></div>
</div>
</div>
<script>
const questions=[
{q:"How many total hours are on the calendar for P02W3?",opts:["30 hours","36 hours","35.5 hours","42 hours"],ans:1,explain:"This week has 36 hours across Districts 6, 8, and 9."},
{q:"What should you do if you receive strips for the Keurig Corner floor stand or Islander floor stand?",opts:["Set them as shown on your tablet","Hold them on the Kompass cart for next week","Toss them — they were accidentally added and removed from SI","Email the hotline for guidance"],ans:2,explain:"Both were mistakenly added to the event and removed from SI. They are duplicate assortment — toss the strips."},
{q:"Why is Peet's Coffee showing deletes in the Bag and K-Cup sets?",opts:["Peet's is being discontinued","Peet's is transitioning from DSD to warehouse delivery — those are UPC changes, not true deletes","Peet's is being replaced by a new brand","The K-Cup sets are shrinking overall"],ans:1,explain:"Peet's, Stumptown, Caribou, and Intelligentsia are transitioning from DSD to warehouse. The deletes are UPC changes — do not pull the product."},
{q:"Dish Detergent is adding a shelf to every bay this week. What should you do if the new shelves haven't arrived yet?",opts:["Skip the set and roll it to next week","Wait until shelves arrive before starting","Check with the store for alternatives like top stock shelves or endcap shelves","Call the hotline to request an extension"],ans:2,explain:"Shelves are late. Check with the store — use top stock, endcap shelves with cardboard signage (4ft wide), or shelves from other departments. Let the store know replacements are on the way."},
{q:"For Dish Detergent, what height should Shelf 5 be set to?",opts:["55 inches as the planogram states","52 inches — one inch lower than the planogram","50 inches","54 inches"],ans:1,explain:"Shelves 5 and 6 must be set one inch lower than the POG calls for. Shelf 5 at 52 inches, Shelf 6 at 64 inches. Otherwise the large Cascade liquid locks up."},
{q:"What is the biggest callout for Salad Dressing this week?",opts:["New shelving fixtures are required","Code dates — watch for out-of-dates and close-dates","A full aisle reset with new brand flow","Cross-commodity strips need to be run separately"],ans:1,explain:"Testing found a significant amount of outdated and close-dated product. Pay close attention to proper rotation."},
{q:"During the Cigarettes reset, what should you do with the On! Plus product?",opts:["Force it into the existing classic tray","Place it flat on the shelf with the shelf tag — do not put it in a tray","Hold it in the back room until Altria arrives","Set it on an endcap display near tobacco"],ans:1,explain:"On! Plus uses a larger round can that will not fit the classic tray. Place it flat on the shelf in the correct position. Altria field sales will come in afterward to install the new trays."},
{q:"When moving the On Classic tray hardware in a 12-foot core set, how many shelves do you move it down?",opts:["2 shelves","3 shelves","1 shelf","It stays on the same shelf"],ans:2,explain:"In a 12-foot core set, move the existing tray hardware down 1 shelf. In an 8-foot core set, it moves down 2 shelves."},
{q:"If you have a complicated issue with a set, what should you do?",opts:["Send it straight to the hotline","Leave it incomplete and note it in your EOD email","Bring it to me first — sign the set out, treat it as an NII, and get it reloaded when a fix comes through","Skip it and move to the next set"],ans:2,explain:"Bring issues to Tyson first. Sign the set out even if there's a problem, treat it as an NII, and it can be reloaded when a fix is obtained. Goal is zero backlog."},
{q:"What special project is coming up that I mentioned at the end of the meeting?",opts:["A full store remodel blitz","Spring Adult Beverage resets","Fuel coolers","Deli layout expansion"],ans:2,explain:"Fuel coolers are coming up as a special project. Details will be in the dump bin. They need to be scheduled and completed the same week — high priority."}
];
let answered={},locked=false;
const body=document.getElementById('quizBody'),btn=document.getElementById('submitBtn'),nameInput=document.getElementById('nameInput'),progressFill=document.getElementById('progressFill');
function render(){questions.forEach((q,i)=>{const card=document.createElement('div');card.className='question-card';card.id='card-'+i;card.innerHTML='<div class="q-number">Question '+(i+1)+'</div><div class="q-text">'+q.q+'</div>'+q.opts.map((o,j)=>'<div class="option" data-q="'+i+'" data-o="'+j+'"><span class="letter">'+'ABCD'[j]+'</span><span class="label">'+o+'</span></div>').join('')+'<div class="feedback" id="fb-'+i+'"></div>';body.appendChild(card);})}
render();
document.querySelectorAll('.option').forEach(function(o){o.addEventListener('click',function(){if(locked)return;var qi=+this.dataset.q,oi=+this.dataset.o;document.querySelectorAll('[data-q="'+qi+'"]').forEach(function(el){el.classList.remove('selected');});this.classList.add('selected');answered[qi]=oi;updateProgress();checkReady();});});
nameInput.addEventListener('input',checkReady);
function updateProgress(){var count=Object.keys(answered).length;progressFill.style.width=(count/questions.length*100)+'%';}
function checkReady(){btn.disabled=!(Object.keys(answered).length===questions.length&&nameInput.value.trim());}
btn.addEventListener('click',function(){
if(locked)return;locked=true;
var score=0,missed=[];
questions.forEach(function(q,i){
var card=document.getElementById('card-'+i),fb=document.getElementById('fb-'+i),sel=answered[i],correct=q.ans;
document.querySelectorAll('[data-q="'+i+'"]').forEach(function(o){
o.classList.add('locked');
var oi=+o.dataset.o;
if(oi===correct)o.classList.add('show-correct');
if(oi===sel&&sel!==correct)o.classList.add('show-wrong');
});
if(sel===correct){score++;card.classList.add('correct');fb.className='feedback correct-fb';fb.textContent='Correct!';}
else{card.classList.add('wrong');fb.className='feedback wrong-fb';fb.textContent=q.explain;missed.push('Q'+(i+1));}
});
var pct=Math.round(score/questions.length*100);
var verdict='';
if(score===10)verdict="Perfect. You were paying attention.";
else if(score>=8)verdict="Solid. Review the ones you missed.";
else if(score>=6)verdict="Watch the presentation again — key details were missed.";
else verdict="Go back and rewatch the full presentation before your next shift.";
var resultBox=document.getElementById('resultBox');
document.getElementById('scoreDisplay').textContent=score+' / '+questions.length;
document.getElementById('verdictDisplay').textContent=verdict;
resultBox.style.display='block';
btn.disabled=true;btn.textContent='Submitted';
var payload={periodWeek:"P02W3",name:nameInput.value.trim(),score:score,outOf:questions.length,percent:pct,missed:missed.join(', ')||'None'};
fetch('https://script.google.com/macros/s/AKfycbzmcP_mKbuBt-pY1zMGhgrgOWae3uI72PreeTaQTHJDc1Uj4oGq424zRRsdZ8YKo8c1/exec',{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).then(function(){document.getElementById('subNote').textContent='Results submitted.';}).catch(function(){document.getElementById('subNote').textContent='Submission failed — screenshot this and send to Tyson.';});
resultBox.scrollIntoView({behavior:'smooth'});
});
</script>
</body>
</html>
