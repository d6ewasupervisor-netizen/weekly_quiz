<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P06W4 Team Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#1B2A4A;--teal:#0891B2;--orange:#F59E0B;--red:#DC2626;--green:#15803D;--light:#F0F4F8;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--light);color:#1e293b;padding-bottom:60px}
header{background:var(--navy);color:#fff;padding:22px 18px;border-bottom:4px solid var(--teal)}
header h1{font-family:'Space Mono',monospace;font-size:1.15rem;letter-spacing:.04em}
header p{font-size:.85rem;opacity:.8;margin-top:6px}
.progress-wrap{position:sticky;top:0;background:var(--navy);padding:0;z-index:5}
.progress{height:6px;background:#33415c}
.progress-fill{height:100%;width:0;background:var(--orange);transition:width .25s}
main{max-width:640px;margin:0 auto;padding:16px}
.name-card,.q-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(27,42,74,.12)}
.name-card label{font-family:'Space Mono',monospace;font-size:.8rem;color:var(--navy);display:block;margin-bottom:6px}
.name-card input{width:100%;padding:12px;border:2px solid #cbd5e1;border-radius:8px;font-size:1rem;font-family:'DM Sans',sans-serif}
.name-card input:focus{outline:none;border-color:var(--teal)}
.q-num{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--teal);font-weight:700;margin-bottom:4px}
.q-text{font-weight:700;font-size:1rem;margin-bottom:10px}
.opt{display:block;width:100%;text-align:left;padding:12px;margin-bottom:8px;border:2px solid #e2e8f0;border-radius:8px;background:#fff;font-size:.92rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:border-color .15s}
.opt.sel{border-color:var(--teal);background:#ECFEFF}
.opt.correct{border-color:var(--green);background:#DCFCE7}
.opt.wrong{border-color:var(--red);background:#FEE2E2;text-decoration:line-through}
.opt:disabled{cursor:default;opacity:1;color:#1e293b}
.feedback{font-size:.85rem;margin-top:6px;padding:10px;border-radius:8px;display:none}
.feedback.good{display:block;background:#DCFCE7;color:var(--green)}
.feedback.bad{display:block;background:#FEF3C7;color:#92400E}
.submit-btn{width:100%;padding:16px;border:0;border-radius:10px;background:var(--orange);color:#fff;font-weight:700;font-size:1.05rem;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:6px}
.submit-btn:disabled{background:#cbd5e1;cursor:not-allowed}
.verdict{display:none;background:var(--navy);color:#fff;border-radius:12px;padding:20px;margin-top:16px;text-align:center}
.verdict .score{font-family:'Space Mono',monospace;font-size:2rem;color:var(--orange)}
.verdict p{margin-top:8px;font-size:.95rem}
.overlay{position:fixed;inset:0;background:rgba(27,42,74,.9);display:none;align-items:center;justify-content:center;z-index:50}
.overlay.show{display:flex}
.overlay-box{background:#fff;border-radius:14px;padding:32px 40px;text-align:center;min-width:240px}
.spinner{width:40px;height:40px;border:4px solid #e2e8f0;border-top-color:var(--teal);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sync-msg{font-family:'Space Mono',monospace;font-size:.9rem;color:var(--navy)}
.sync-msg.done{color:var(--green);font-weight:700}
</style>
</head>
<body>
<header>
  <h1>P06W4 TEAM QUIZ</h1>
  <p>10 questions from this week's briefing. Answer everything, enter your name, and hit submit.</p>
</header>
<div class="progress-wrap"><div class="progress"><div class="progress-fill" id="fill"></div></div></div>
<main>
  <div class="name-card">
    <label for="name">YOUR NAME (REQUIRED)</label>
    <input type="text" id="name" placeholder="First and last name" autocomplete="name">
  </div>
  <div id="quiz"></div>
  <button class="submit-btn" id="submit" disabled>Submit Answers</button>
  <div class="verdict" id="verdict"></div>
</main>
<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="spinner" id="spin"></div>
    <div class="sync-msg" id="syncmsg">Buffering...</div>
  </div>
</div>
<script>
const PERIOD_WEEK = "P06W4";
const ENDPOINT = "https://script.google.com/macros/s/AKfycbzmcP_mKbuBt-pY1zMGhgrgOWae3uI72PreeTaQTHJDc1Uj4oGq424zRRsdZ8YKo8c1/exec";

const QS = [
 {q:"What is the top priority this week?",
  o:["Coffee reset at all stores","Check stands / check lanes — complete by end of week","Frozen Vegetables before Wednesday","Vestcom box returns"],
  a:1, why:"Check stands and check lanes are the stated top priority — complete by end of week, no exceptions."},
 {q:"The coffee planogram estimate is built on an 8-foot bag set, but our average store runs about 20 feet. How many hours should you plan for on Coffee?",
  o:["6 hours","8 hours","11 hours","15 hours"],
  a:2, why:"Plan for 11 hours. The calendar estimate undersells it — the test run went 28 feet."},
 {q:"What was the coffee method that worked on the test run?",
  o:["One person working left to right","Two people starting at both ends — pull Dunkin and Kroger into carts, then move Seattle's Best","Set the Starbucks fixture first, then work outward","Pull the entire wall before setting anything"],
  a:1, why:"Two people, both ends: pull all the Dunkin and Kroger into carts, then move the Seattle's Best."},
 {q:"On the Frozen Vegetables reset, what do you do with the shelf heights printed on the planogram?",
  o:["Follow them exactly","Disregard them and use the adjusted heights from the notes","Only use them on 8-door sets","Ask the store manager to choose"],
  a:1, why:"Disregard the printed heights — the POG scrunches the set with a big air gap. Use the adjusted heights (0/11/21/31/41/51), confirmed against the older 59–61 inch cases."},
 {q:"On refrigerated and frozen sets this week, what is the maximum time product can be out of the case?",
  o:["10 minutes","20 minutes","30 minutes","45 minutes"],
  a:1, why:"20 minutes is the cold-chain rule on every refrigerated/frozen set this week."},
 {q:"What shelf change happens in the jelly section on the PBJ reset?",
  o:["Two shelves are removed from each bay","One shelf is added per bay — the new shelf 5 at 5 inches","All shelves move up 2 inches","Jelly converts to pegboard"],
  a:1, why:"Jelly gains one shelf per bay — the new shelf 5 at 5 inches, fitting the existing wide gap. The shelf removals happen on the peanut butter side."},
 {q:"Which District 8 stores convert to the VX (community segmented, high-WIC) planogram on Infant Formula?",
  o:["19, 28, 215","23, 31, 53","391, 459, 658","All ten stores"],
  a:0, why:"Stores 19, 28, and 215 are flagged High Volume WIC and convert to VX. Everyone else verifies segmentation and follows the POG designated for their location — MX and VX are not interchangeable."},
 {q:"What do you do with the artisan bread romance tags during the Bread reset?",
  o:["Toss them with the deletes","Hand them to the front end","Do NOT throw them away — hold onto them","Mail them back in the Vestcom box"],
  a:2, why:"Hold onto the romance tags — they must not be thrown away. Reference photos are in the briefing."},
 {q:"On the fuel sets, who moves product between the store and the fuel center?",
  o:["Our team, using totes","Store and fuel center personnel only — we are not permitted to transport it in either direction","Whoever finishes their section first","The vendor rep"],
  a:1, why:"Hard rule: we never transport product between the store and fuel center in either direction. Coordinate with store management and fuel staff — they move it."},
 {q:"You're at one of the eight stores where the branded primary battery end (V675 F005) is unmapped. What do you do with the strips in your Vestcom box?",
  o:["Toss all battery-end strips","Toss ONLY the strips labeled V675 F005 and set the second battery end normally","Set both battery ends anyway","Return all strips to me unsorted"],
  a:1, why:"There are TWO battery-end POGs and only V675 F005 was unmapped. Check the POG name printed on the strips — toss only the F005 strips, cross that line off the worksheet, and set the second end per the POG PDFs."}
];

const quiz = document.getElementById('quiz');
const answers = new Array(QS.length).fill(null);
QS.forEach((item, i) => {
  const card = document.createElement('div');
  card.className = 'q-card';
  card.innerHTML = `<div class="q-num">QUESTION ${i+1} OF ${QS.length}</div><div class="q-text">${item.q}</div>` +
    item.o.map((opt, j) => `<button class="opt" data-q="${i}" data-o="${j}">${String.fromCharCode(65+j)}. ${opt}</button>`).join('') +
    `<div class="feedback" id="fb${i}"></div>`;
  quiz.appendChild(card);
});

document.querySelectorAll('.opt').forEach(btn => {
  btn.addEventListener('click', () => {
    const q = +btn.dataset.q, o = +btn.dataset.o;
    answers[q] = o;
    document.querySelectorAll(`.opt[data-q="${q}"]`).forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    updateState();
  });
});

const nameInput = document.getElementById('name');
nameInput.addEventListener('input', updateState);

function updateState(){
  const done = answers.filter(a => a !== null).length;
  document.getElementById('fill').style.width = (done / QS.length * 100) + '%';
  document.getElementById('submit').disabled = !(done === QS.length && nameInput.value.trim().length > 0);
}

document.getElementById('submit').addEventListener('click', () => {
  const btn = document.getElementById('submit');
  btn.disabled = true;
  nameInput.disabled = true;
  let score = 0;
  const missed = [];
  QS.forEach((item, i) => {
    const chosen = answers[i];
    document.querySelectorAll(`.opt[data-q="${i}"]`).forEach(b => {
      b.disabled = true;
      const o = +b.dataset.o;
      if (o === item.a) b.classList.add('correct');
      else if (o === chosen) b.classList.add('wrong');
    });
    const fb = document.getElementById('fb' + i);
    if (chosen === item.a) {
      score++;
      fb.className = 'feedback good';
      fb.textContent = 'Correct.';
    } else {
      missed.push(i + 1);
      fb.className = 'feedback bad';
      fb.textContent = item.why;
    }
  });

  const percent = Math.round(score / QS.length * 100);
  let msg;
  if (score === 10) msg = "Perfect. You were paying attention.";
  else if (score >= 8) msg = "Solid. Review the ones you missed.";
  else if (score >= 6) msg = "Watch the presentation again — key details were missed.";
  else msg = "Go back and rewatch the full presentation before your next shift.";

  const payload = {
    periodWeek: PERIOD_WEEK,
    name: nameInput.value.trim(),
    score: score,
    outOf: QS.length,
    percent: percent,
    missed: missed.join(', ') || 'none'
  };

  const overlay = document.getElementById('overlay');
  const syncmsg = document.getElementById('syncmsg');
  const spin = document.getElementById('spin');
  overlay.classList.add('show');
  spin.style.display = 'block';
  syncmsg.className = 'sync-msg';
  syncmsg.textContent = 'Buffering...';

  let postFailed = false;
  fetch(ENDPOINT, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  }).catch(() => { postFailed = true; });

  setTimeout(() => {
    spin.style.display = 'none';
    syncmsg.className = 'sync-msg done';
    syncmsg.textContent = 'Your results have been submitted.';
    setTimeout(() => {
      overlay.classList.remove('show');
      const v = document.getElementById('verdict');
      v.style.display = 'block';
      let extra = postFailed ? '<p><b>Screenshot this and send to me.</b></p>' : '';
      v.innerHTML = `<div class="score">${score}/${QS.length}</div><p>${msg}</p>${extra}`;
      v.scrollIntoView({behavior: 'smooth'});
    }, 2000);
  }, 1500);
});
</script>
</body>
</html>
