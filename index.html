<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>District 8 — P05W3 Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B2A4A;
    --teal:#0891B2;
    --orange:#F59E0B;
    --light:#F0F4F8;
    --green:#16A34A;
    --green-bg:#DCFCE7;
    --amber-bg:#FEF3C7;
    --red:#DC2626;
    --red-bg:#FEE2E2;
    --ink:#1B2A4A;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--light);
    color:var(--ink);
    font-family:'DM Sans',system-ui,sans-serif;
    line-height:1.5;
    padding:16px;
  }
  .wrap{max-width:680px;margin:0 auto;}
  header{
    background:var(--navy);
    color:#fff;
    border-radius:14px;
    padding:22px 20px;
    margin-bottom:16px;
  }
  .tag{
    font-family:'Space Mono',monospace;
    font-weight:700;
    font-size:.72rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--orange);
    display:block;
    margin-bottom:6px;
  }
  header h1{margin:0;font-size:1.5rem;line-height:1.2;}
  header p{margin:8px 0 0;font-size:.9rem;color:#CBD5E1;}
  .namebox{
    background:#fff;
    border-radius:14px;
    padding:16px;
    margin-bottom:16px;
    box-shadow:0 1px 3px rgba(27,42,74,.08);
  }
  .namebox label{
    font-family:'Space Mono',monospace;
    font-size:.7rem;
    font-weight:700;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--teal);
    display:block;
    margin-bottom:8px;
  }
  .namebox input{
    width:100%;
    padding:12px 14px;
    border:2px solid #D7E0EA;
    border-radius:10px;
    font-size:1rem;
    font-family:inherit;
  }
  .namebox input:focus{outline:none;border-color:var(--teal);}
  .progress{
    position:sticky;top:0;z-index:5;
    height:8px;background:#D7E0EA;border-radius:99px;
    margin-bottom:18px;overflow:hidden;
  }
  .progress-fill{height:100%;width:0;background:var(--teal);transition:width .25s ease;}
  .q{
    background:#fff;
    border-radius:14px;
    padding:18px;
    margin-bottom:14px;
    box-shadow:0 1px 3px rgba(27,42,74,.08);
  }
  .q-num{
    font-family:'Space Mono',monospace;
    font-size:.7rem;font-weight:700;letter-spacing:.1em;
    color:var(--orange);text-transform:uppercase;
  }
  .q-text{font-weight:700;font-size:1.05rem;margin:6px 0 14px;}
  .option{
    display:flex;align-items:flex-start;gap:10px;
    width:100%;text-align:left;
    border:2px solid #D7E0EA;border-radius:10px;
    background:#fff;color:var(--ink);
    padding:12px 14px;margin-bottom:9px;
    font-size:.97rem;font-family:inherit;cursor:pointer;
    transition:border-color .15s,background .15s;
  }
  .option .ltr{
    font-family:'Space Mono',monospace;font-weight:700;
    color:var(--teal);flex:0 0 auto;
  }
  .option:hover{border-color:var(--teal);}
  .option.selected{border-color:var(--teal);background:#ECFEFF;}
  .option.correct{border-color:var(--green);background:var(--green-bg);}
  .option.correct .ltr{color:var(--green);}
  .option.wrong{border-color:var(--red);background:var(--red-bg);}
  .option.wrong .ltr{color:var(--red);}
  .option.wrong .opt-txt{text-decoration:line-through;opacity:.75;}
  .option.show-correct{border-color:var(--green);background:var(--green-bg);}
  .option.show-correct .ltr{color:var(--green);}
  .locked .option{cursor:default;}
  .feedback{
    display:none;margin-top:8px;padding:10px 12px;border-radius:8px;
    font-size:.9rem;font-weight:500;
  }
  .feedback.show{display:block;}
  .feedback.correct-fb{background:var(--green-bg);color:#166534;}
  .feedback.wrong-fb{background:var(--red-bg);color:#991B1B;}
  #submitBtn{
    width:100%;padding:16px;border:none;border-radius:12px;
    background:var(--orange);color:var(--navy);
    font-family:'Space Mono',monospace;font-weight:700;
    font-size:1rem;letter-spacing:.06em;text-transform:uppercase;
    cursor:pointer;margin-top:6px;
  }
  #submitBtn:disabled{background:#C9D3DF;color:#7C8AA0;cursor:not-allowed;}
  .verdict{
    display:none;margin-top:18px;border-radius:14px;padding:22px;text-align:center;
  }
  .verdict.show{display:block;}
  .verdict .score-num{font-family:'Space Mono',monospace;font-size:2.4rem;font-weight:700;}
  .verdict .score-msg{font-weight:700;font-size:1.05rem;margin-top:4px;}
  .verdict .fallback{margin-top:12px;font-size:.85rem;color:#991B1B;font-weight:500;}

  /* Submit overlay */
  .overlay{
    display:none;position:fixed;inset:0;z-index:50;
    background:rgba(27,42,74,.55);backdrop-filter:blur(2px);
    align-items:center;justify-content:center;
  }
  .overlay.show{display:flex;}
  .overlay-box{
    background:#fff;border-radius:16px;padding:34px 40px;
    text-align:center;box-shadow:0 12px 40px rgba(27,42,74,.3);
    min-width:240px;
  }
  .spinner{
    width:46px;height:46px;margin:0 auto 18px;
    border:5px solid #D7E0EA;border-top-color:var(--teal);
    border-radius:50%;animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .sync-msg{
    font-family:'Space Mono',monospace;font-weight:700;
    font-size:1rem;letter-spacing:.04em;color:var(--navy);
  }
  .sync-msg.done{color:var(--green);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="tag">District 8 &middot; P05W3</span>
    <h1>Weekly Reset Quiz</h1>
    <p>10 questions on this week's presentation. Enter your name, answer all 10, then submit.</p>
  </header>

  <div class="namebox">
    <label for="quizName">Your Name</label>
    <input type="text" id="quizName" placeholder="First and last name" autocomplete="name">
  </div>

  <div class="progress"><div class="progress-fill" id="progressFill"></div></div>

  <div id="container"></div>

  <button id="submitBtn" disabled>Answer all 10 to submit</button>

  <div class="verdict" id="verdict"></div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="spinner" id="spinner"></div>
    <div class="sync-msg" id="syncMsg">Buffering...</div>
  </div>
</div>

<script>
  const PERIOD_WEEK = "P05W3";
  const ENDPOINT = "https://script.google.com/macros/s/AKfycbzmcP_mKbuBt-pY1zMGhgrgOWae3uI72PreeTaQTHJDc1Uj4oGq424zRRsdZ8YKo8c1/exec";

  const questions = [
    {
      q: 'What are the "big three" sets to plan your days around this week?',
      options: [
        "Yogurt, Cookies, and Foilware",
        "Spices, the Meat & Pasta integration, and Bag Salad",
        "Seafood, Bag Salad, and Dry Cheese",
        "Checklanes, Cereal, and Aseptic Juice"
      ],
      answer: 1,
      explain: "The big three carry the hours and the shelf-height work this week: Spices, the Meat & Pasta integration, and Bag Salad."
    },
    {
      q: "When should you send the AFTER pictures for the refrigerated and frozen seafood (C517/C518)?",
      options: [
        "The moment you finish setting them — don't wait until end of day",
        "At end of day, attached to your EOD",
        "Only if there's a problem with the set",
        "Within 24 hours of finishing"
      ],
      answer: 0,
      explain: "Send the seafood after pictures to me the moment the set is done — don't hold them for end of day."
    },
    {
      q: "How should Bag Salad (C640) be prioritized?",
      options: [
        "Save it for the end of the day",
        "Do it whenever it's convenient",
        "It's a produce priority — do it first thing unless told otherwise",
        "Skip it unless the store asks"
      ],
      answer: 2,
      explain: "Bag Salad is a produce priority on the 20-minute rule — get it done first thing unless directed otherwise."
    },
    {
      q: "What's the golden rule for integrating Canned Meat (C004) and Canned Pasta (C023)?",
      options: [
        "Integrate them in every store, no exceptions",
        "Integrate only when each commodity is 4 feet or greater",
        "Integrate only when they're adjacent AND each commodity is 8 feet or greater",
        "Never integrate — always keep them on separate runs"
      ],
      answer: 2,
      explain: "Only integrate the two when they're adjacent and each commodity is 8 feet or greater."
    },
    {
      q: "Which District 8 stores are the C004/C023 integration stores?",
      options: [
        "23, 28, 53, 215, 682",
        "19, 31, 391, 459, 658",
        "All ten District 8 stores",
        "53, 215, 459, 658, 682"
      ],
      answer: 0,
      explain: "The District 8 integration stores are 23, 28, 53, 215, and 682."
    },
    {
      q: "On the Spices reset (C013), which sets get the shelf-height movement?",
      options: [
        "Every spice set",
        "20-foot sets only",
        "The meat department rack only",
        "12-foot and 16-foot sets only — 20-foot sets are not impacted"
      ],
      answer: 3,
      explain: "Shelf-height movement is on the 12-foot and 16-foot sets only. The 20-foot sets are not impacted."
    },
    {
      q: "In the spice tins bay, what happens to SmartWay?",
      options: [
        "It moves up to shelf 8",
        "It's discontinued",
        "It moves to the very bottom shelf",
        "It swaps places with the premium glass bay"
      ],
      answer: 0,
      explain: "Pull SmartWay and McCormick first — SmartWay moves up to shelf 8, and all the tins move down one shelf."
    },
    {
      q: "On Kitchen & Trash Bags (C153), what happens on the 8-foot planograms?",
      options: [
        "Shelves 2 through 5 move down about an inch or two",
        "Shelf 5 moves up",
        "Nothing changes on the 8-foot sets",
        "The whole set is deleted"
      ],
      answer: 0,
      explain: "On 8-foot planograms, shelves 2–5 move down about 1–2 inches. (On 4-foot planograms, shelf 5 moves up.)"
    },
    {
      q: "On Bag Salad, what's the crucial rule about the branded salad identifier cards?",
      options: [
        "Throw them out with the deletes",
        "Leave them where they are",
        "You must move them with the product",
        "Only move them if the store asks"
      ],
      answer: 2,
      explain: "You must move the branded salad identifier cards with the product — samples are in the Compass notes."
    },
    {
      q: "On Kitchen & Trash Bags (C153), which store gets C115 update strips instead of a new-item set?",
      options: [
        "Store 53",
        "Store 31",
        "Store 459",
        "Every District 8 store"
      ],
      answer: 1,
      explain: "Store 31 is the exception — it receives C115 update strips instead of NII, because of a remapping."
    }
  ];

  const LETTERS = ["A", "B", "C", "D"];
  const container = document.getElementById("container");
  const submitBtn = document.getElementById("submitBtn");
  const progressFill = document.getElementById("progressFill");
  const nameInput = document.getElementById("quizName");
  const verdict = document.getElementById("verdict");
  const overlay = document.getElementById("overlay");
  const spinner = document.getElementById("spinner");
  const syncMsg = document.getElementById("syncMsg");

  const selections = new Array(questions.length).fill(-1);
  let submitted = false;

  questions.forEach((q, i) => {
    const card = document.createElement("div");
    card.className = "q";
    card.id = "q" + i;

    const num = document.createElement("div");
    num.className = "q-num";
    num.textContent = "Question " + (i + 1) + " of " + questions.length;
    card.appendChild(num);

    const text = document.createElement("div");
    text.className = "q-text";
    text.textContent = q.q;
    card.appendChild(text);

    q.options.forEach((opt, j) => {
      const btn = document.createElement("button");
      btn.className = "option";
      btn.type = "button";
      btn.innerHTML = '<span class="ltr">' + LETTERS[j] + '</span><span class="opt-txt">' + opt + '</span>';
      btn.onclick = () => {
        if (submitted) return;
        selections[i] = j;
        card.querySelectorAll(".option").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        updateProgress();
      };
      card.appendChild(btn);
    });

    const fb = document.createElement("div");
    fb.className = "feedback";
    fb.id = "fb" + i;
    card.appendChild(fb);

    container.appendChild(card);
  });

  function updateProgress() {
    const answered = selections.filter(a => a >= 0).length;
    progressFill.style.width = (answered / questions.length * 100) + "%";
    const ready = answered === questions.length && nameInput.value.trim().length > 0;
    submitBtn.disabled = !ready;
    submitBtn.textContent = ready
      ? "Submit Quiz"
      : "Answer all " + questions.length + " to submit";
  }
  nameInput.addEventListener("input", updateProgress);

  submitBtn.onclick = () => {
    if (submitted) return;
    submitted = true;
    submitBtn.disabled = true;

    let score = 0;
    const missed = [];
    questions.forEach((q, i) => {
      if (selections[i] === q.answer) score++;
      else missed.push("Q" + (i + 1));
    });
    const percent = Math.round(score / questions.length * 100);

    const payload = {
      periodWeek: PERIOD_WEEK,
      name: nameInput.value.trim(),
      score: score,
      outOf: questions.length,
      percent: percent,
      missed: missed.join(", ") || "None"
    };

    let postOk = null;
    fetch(ENDPOINT, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    }).then(() => { postOk = true; }).catch(() => { postOk = false; });

    // Buffering overlay sequence
    overlay.classList.add("show");
    syncMsg.textContent = "Buffering...";
    syncMsg.classList.remove("done");
    spinner.style.display = "block";

    setTimeout(() => {
      spinner.style.display = "none";
      syncMsg.textContent = "Your results have been submitted.";
      syncMsg.classList.add("done");
    }, 1500);

    setTimeout(() => {
      overlay.classList.remove("show");
      revealResults(score, percent, postOk);
    }, 3500);
  };

  function revealResults(score, percent, postOk) {
    questions.forEach((q, i) => {
      const card = document.getElementById("q" + i);
      card.classList.add("locked");
      const opts = card.querySelectorAll(".option");
      const fb = document.getElementById("fb" + i);
      if (selections[i] === q.answer) {
        opts[selections[i]].classList.add("correct");
        fb.className = "feedback show correct-fb";
        fb.textContent = "\u2713 Correct!";
      } else {
        if (selections[i] >= 0) opts[selections[i]].classList.add("wrong");
        opts[q.answer].classList.add("show-correct");
        fb.className = "feedback show wrong-fb";
        fb.textContent = "\u2717 " + q.explain;
      }
    });

    let msg, bg;
    if (score === 10) { msg = "Perfect. You were paying attention."; bg = "var(--green-bg)"; }
    else if (score >= 8) { msg = "Solid. Review the ones you missed."; bg = "var(--green-bg)"; }
    else if (score >= 6) { msg = "Watch the presentation again — key details were missed."; bg = "var(--amber-bg)"; }
    else { msg = "Go back and rewatch the full presentation before your next shift."; bg = "var(--red-bg)"; }

    verdict.style.background = bg;
    verdict.innerHTML =
      '<div class="score-num">' + score + "/10</div>" +
      '<div class="score-msg">' + msg + "</div>";
    if (postOk === false) {
      verdict.innerHTML += '<div class="fallback">Results could not be sent automatically. Screenshot this and send it to me.</div>';
    }
    verdict.classList.add("show");
    submitBtn.style.display = "none";
    verdict.scrollIntoView({ behavior: "smooth" });
  }
</script>
</body>
</html>
