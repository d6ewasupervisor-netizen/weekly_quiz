<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P06W3 Team Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1B2A4A;
    --teal: #0891B2;
    --orange: #F59E0B;
    --red: #DC2626;
    --light: #F0F4F8;
    --green: #16A34A;
    --yellow-bg: #FEF3C7;
    --blue-bg: #ECFEFF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--light);
    color: var(--navy);
    line-height: 1.5;
    padding-bottom: 60px;
  }
  header {
    background: var(--navy);
    color: #fff;
    padding: 24px 16px 20px;
    text-align: center;
    border-bottom: 4px solid var(--teal);
  }
  header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 1.3rem;
    letter-spacing: 1px;
  }
  header p {
    color: var(--teal);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    margin-top: 6px;
  }
  .progress-wrap {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--navy);
    padding: 8px 16px 10px;
  }
  .progress-track {
    background: rgba(255,255,255,0.15);
    border-radius: 99px;
    height: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--teal), var(--orange));
    border-radius: 99px;
    transition: width 0.3s ease;
  }
  .progress-label {
    color: #fff;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    text-align: right;
    margin-top: 4px;
  }
  main { max-width: 640px; margin: 0 auto; padding: 16px; }
  .name-card, .q-card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(27,42,74,0.12);
    padding: 16px;
    margin-bottom: 16px;
    border-top: 4px solid var(--teal);
  }
  .name-card label {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 8px;
  }
  .name-card input {
    width: 100%;
    padding: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    border: 2px solid var(--navy);
    border-radius: 8px;
    outline: none;
  }
  .name-card input:focus { border-color: var(--teal); }
  .q-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--teal);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .q-text { font-weight: 700; font-size: 1rem; margin-bottom: 12px; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px;
    border: 2px solid #dbe4ee;
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    font-size: 0.95rem;
  }
  .opt:active { background: var(--blue-bg); }
  .opt.selected { border-color: var(--teal); background: var(--blue-bg); }
  .opt-letter {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    color: var(--navy);
    flex-shrink: 0;
  }
  .quiz-locked .opt { cursor: default; pointer-events: none; }
  .opt.correct-ans {
    border-color: var(--green);
    background: #F0FDF4;
  }
  .opt.wrong-pick {
    border-color: var(--red);
    background: #FEF2F2;
    text-decoration: line-through;
  }
  .feedback {
    display: none;
    font-size: 0.85rem;
    border-radius: 8px;
    padding: 10px 12px;
    margin-top: 4px;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #F0FDF4; color: var(--green); font-weight: 700; }
  .feedback.bad { background: var(--yellow-bg); color: var(--navy); }
  .feedback.bad strong { color: var(--red); }
  #submitBtn {
    display: block;
    width: 100%;
    padding: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #fff;
    background: var(--teal);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }
  #submitBtn:disabled {
    background: #9db2c4;
    cursor: not-allowed;
  }
  #submitHint {
    text-align: center;
    font-size: 0.8rem;
    color: #5b6b82;
    margin-top: 8px;
  }
  #resultCard {
    display: none;
    background: var(--navy);
    color: #fff;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    margin-bottom: 16px;
    border-top: 4px solid var(--orange);
  }
  #resultCard .score {
    font-family: 'Space Mono', monospace;
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--orange);
  }
  #resultCard .verdict { margin-top: 8px; font-size: 1rem; }
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(27,42,74,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .overlay.active { display: flex; }
  .overlay-box {
    background: #fff;
    border-radius: 16px;
    padding: 32px 40px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .spinner {
    width: 44px;
    height: 44px;
    border: 5px solid var(--blue-bg);
    border-top-color: var(--teal);
    border-radius: 50%;
    margin: 0 auto 14px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sync-msg {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--navy);
  }
  .sync-msg.done { color: var(--green); }
</style>
</head>
<body>

<header>
  <h1>P06W3 TEAM QUIZ</h1>
  <p>DISTRICT 8 &middot; 10 QUESTIONS</p>
</header>

<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">0 / 10 ANSWERED</div>
</div>

<main>
  <div class="name-card">
    <label for="nameInput">YOUR NAME (REQUIRED)</label>
    <input type="text" id="nameInput" placeholder="First and last name" autocomplete="name">
  </div>

  <div id="resultCard">
    <div class="score" id="scoreText"></div>
    <div class="verdict" id="verdictText"></div>
  </div>

  <div id="quizContainer"></div>

  <button id="submitBtn" disabled>Submit Quiz</button>
  <p id="submitHint">Enter your name and answer all 10 questions to submit.</p>
</main>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="spinner" id="spinner"></div>
    <div class="sync-msg" id="syncMsg">Buffering...</div>
  </div>
</div>

<script>
const PERIOD_WEEK = "P06W3";
const POST_URL = "https://script.google.com/macros/s/AKfycbzmcP_mKbuBt-pY1zMGhgrgOWae3uI72PreeTaQTHJDc1Uj4oGq424zRRsdZ8YKo8c1/exec";

const QUESTIONS = [
  {
    q: "What is our anchor set for P06W3?",
    opts: ["C041 Frozen Potatoes", "C046 Frozen Breakfast", "C093 Traditional Mexican Foods", "C115 Foil & Wrap"],
    ans: 1,
    exp: "C046 Frozen Breakfast is the anchor set this week at 8 hours, with the Natural Foods integration."
  },
  {
    q: "Under the 20-minute out-of-case rule, what must you do with the natural doors before moving any shelves in C046?",
    opts: ["Cover the product with thermal blankets", "Pull the product and move it to the back room freezer", "Shift the product to an adjacent open door", "Leave the product in place and work around it"],
    ans: 1,
    exp: "Pull the full natural doors completely out and stage the product in the back room freezer to protect temperatures before shelf work begins."
  },
  {
    q: "Which freezer case brands have the discontinued white grid shelves that must be preserved?",
    opts: ["Hussmann, Hill, and Zero Zone", "Tyler, Kyser, and Warren", "Arneg, Costan, and Bonnet", "True, Turbo Air, and Beverage-Air"],
    ans: 1,
    exp: "Older Tyler, Kyser, or Warren cases have the discontinued white grid shelves. They must be preserved."
  },
  {
    q: "What must you do with the brackets on those white grid shelves?",
    opts: ["Bag them and label the bag with the store number", "Hand them to the department head for storage", "Zip-tie all three pieces per shelf directly to the grid shelves", "Mail them back through the reclaim process"],
    ans: 2,
    exp: "Zip-tie the brackets — all three pieces per shelf — directly to the grid shelves so they don't get lost. Without the brackets, the shelves are worthless."
  },
  {
    q: "Which two of our stores are converting from MX to UX planograms on C041 Frozen Potatoes?",
    opts: ["19 and 23", "31 and 215", "53 and 682", "459 and 658"],
    ans: 2,
    exp: "Stores 53 and 682 are the two District 8 stores converting from MX to UX planograms on Frozen Potatoes."
  },
  {
    q: "What is the correct top-to-bottom flow for the C093 Traditional Mexican Foods reflow?",
    opts: ["Taco Kits, Better For You, OB, then shells by brand", "Shells by brand, OB, Better For You, then Taco Kits", "OB, Taco Kits, shells by brand, then Better For You", "Better For You, Taco Kits, OB, then shells by brand"],
    ans: 0,
    exp: "Top to bottom: Taco Kits first, then Better For You, then OB, and finally the rest of the shells blocked by brand."
  },
  {
    q: "In C204 Enhanced Water, where do the BAI drinks move?",
    opts: ["To the well at the base of the set", "From a right-side block to shelf 6", "To the top shelf next to Propel", "Out of the set entirely — they're deleted"],
    ans: 1,
    exp: "BAI drinks are the only flow change — they move from the right-side block over to shelf 6."
  },
  {
    q: "C115 Foil & Wrap and C213 Cat Litter both require a POG name update. What is it?",
    opts: ["Department 03 to Department 01", "Department 01 to Department 03", "Department 01 to Department 08", "Division 701 to Division 703"],
    ans: 1,
    exp: "Both sets require updating the POG names from Department 01 to Department 03. The version change applies to all ten of our stores."
  },
  {
    q: "In C011 RTD Tea, what replaces the Arizona Tea and Liquid Death duplication on the bottom cooler shelf?",
    opts: ["Pure Leaf 18.5 oz", "Gold Peak sweet tea", "Brisk 33.81 fluid ounce", "Peace Tea tallboys"],
    ans: 2,
    exp: "Pull the Arizona Tea and Liquid Death duplication and replace it with the Brisk 33.81 fluid ounce."
  },
  {
    q: "Looking ahead to P06W4, which three of our stores will undergo High Volume WIC conversions with C094 Infant Formula?",
    opts: ["23, 31, and 53", "19, 28, and 215", "391, 459, and 658", "28, 682, and 215"],
    ans: 1,
    exp: "Stores 19, 28, and 215 get the High Volume WIC conversions with next week's Infant Formula set. Plan for it."
  }
];

const answers = new Array(QUESTIONS.length).fill(null);
let locked = false;

const quizContainer = document.getElementById("quizContainer");
const nameInput = document.getElementById("nameInput");
const submitBtn = document.getElementById("submitBtn");
const submitHint = document.getElementById("submitHint");
const progressFill = document.getElementById("progressFill");
const progressLabel = document.getElementById("progressLabel");

QUESTIONS.forEach((item, qi) => {
  const card = document.createElement("div");
  card.className = "q-card";
  card.id = "q" + qi;
  let optsHtml = "";
  item.opts.forEach((opt, oi) => {
    optsHtml += '<div class="opt" data-q="' + qi + '" data-o="' + oi + '">' +
      '<span class="opt-letter">' + "ABCD"[oi] + '.</span><span>' + opt + '</span></div>';
  });
  card.innerHTML = '<div class="q-num">QUESTION ' + (qi + 1) + ' OF ' + QUESTIONS.length + '</div>' +
    '<div class="q-text">' + item.q + '</div>' + optsHtml +
    '<div class="feedback" id="fb' + qi + '"></div>';
  quizContainer.appendChild(card);
});

quizContainer.addEventListener("click", function(e) {
  if (locked) return;
  const opt = e.target.closest(".opt");
  if (!opt) return;
  const qi = parseInt(opt.dataset.q, 10);
  const oi = parseInt(opt.dataset.o, 10);
  answers[qi] = oi;
  document.querySelectorAll('#q' + qi + ' .opt').forEach(el => el.classList.remove("selected"));
  opt.classList.add("selected");
  updateProgress();
});

nameInput.addEventListener("input", updateProgress);

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  progressFill.style.width = (answered / QUESTIONS.length * 100) + "%";
  progressLabel.textContent = answered + " / " + QUESTIONS.length + " ANSWERED";
  const ready = answered === QUESTIONS.length && nameInput.value.trim().length > 0;
  submitBtn.disabled = !ready;
  submitHint.style.display = ready ? "none" : "block";
}

function getVerdict(score) {
  if (score === 10) return "Perfect. You were paying attention.";
  if (score >= 8) return "Solid. Review the ones you missed.";
  if (score >= 6) return "Watch the presentation again — key details were missed.";
  return "Go back and rewatch the full presentation before your next shift.";
}

submitBtn.addEventListener("click", function() {
  if (locked) return;
  locked = true;
  document.body.classList.add("quiz-locked");
  submitBtn.disabled = true;

  let score = 0;
  const missed = [];
  QUESTIONS.forEach((item, qi) => {
    const picked = answers[qi];
    const opts = document.querySelectorAll('#q' + qi + ' .opt');
    const fb = document.getElementById("fb" + qi);
    opts[item.ans].classList.add("correct-ans");
    if (picked === item.ans) {
      score++;
      fb.className = "feedback show good";
      fb.textContent = "Correct.";
    } else {
      opts[picked].classList.add("wrong-pick");
      missed.push(qi + 1);
      fb.className = "feedback show bad";
      fb.innerHTML = "<strong>Not quite.</strong> " + item.exp;
    }
  });

  const percent = Math.round(score / QUESTIONS.length * 100);
  const name = nameInput.value.trim();
  nameInput.disabled = true;

  const overlay = document.getElementById("overlay");
  const spinner = document.getElementById("spinner");
  const syncMsg = document.getElementById("syncMsg");
  overlay.classList.add("active");
  spinner.style.display = "block";
  syncMsg.textContent = "Buffering...";
  syncMsg.classList.remove("done");

  let postFailed = false;
  try {
    fetch(POST_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        timestamp: new Date().toISOString(),
        periodWeek: PERIOD_WEEK,
        name: name,
        score: score,
        outOf: QUESTIONS.length,
        percent: percent,
        missedQuestions: missed.join(", ") || "None"
      })
    }).catch(function() { postFailed = true; });
  } catch (err) {
    postFailed = true;
  }

  setTimeout(function() {
    spinner.style.display = "none";
    syncMsg.textContent = "Your results have been submitted.";
    syncMsg.classList.add("done");
  }, 1500);

  setTimeout(function() {
    overlay.classList.remove("active");
    const resultCard = document.getElementById("resultCard");
    document.getElementById("scoreText").textContent = score + " / " + QUESTIONS.length;
    let verdict = getVerdict(score);
    if (postFailed) verdict += " Screenshot this and send it to me.";
    document.getElementById("verdictText").textContent = verdict;
    resultCard.style.display = "block";
    resultCard.scrollIntoView({ behavior: "smooth", block: "start" });
    submitBtn.style.display = "none";
  }, 2000);
});
</script>
</body>
</html>
