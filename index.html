<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P03W3 Quiz — District 8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1B2A4A;
    --navy-light: #243560;
    --teal: #0891B2;
    --teal-light: #06B6D4;
    --orange: #F59E0B;
    --orange-light: #FEF3C7;
    --red: #DC2626;
    --red-light: #FEE2E2;
    --green: #16A34A;
    --green-light: #DCFCE7;
    --surface: #F0F4F8;
    --card: #FFFFFF;
    --border: #CBD5E1;
    --text: #1E293B;
    --text-muted: #64748B;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--navy);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .teal-bar {
    height: 4px;
    background: linear-gradient(90deg, var(--teal), var(--teal-light));
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    gap: 12px;
  }
  .header-title {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: 0.05em;
    line-height: 1.3;
  }
  .header-title span {
    display: block;
    font-size: 10px;
    color: var(--teal-light);
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .score-chip {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--orange);
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* PROGRESS */
  .progress-wrap {
    background: var(--navy);
    padding: 0 20px 10px;
  }
  .progress-track {
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    height: 5px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--teal-light));
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    text-align: right;
    margin-top: 5px;
    letter-spacing: 0.05em;
  }

  /* MAIN */
  .main {
    max-width: 680px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* NAME INPUT */
  .name-card {
    background: var(--card);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 16px;
    border: 1.5px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .name-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    color: var(--teal);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    display: block;
  }
  .name-input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color 0.2s;
  }
  .name-input:focus {
    border-color: var(--teal);
    background: #fff;
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--card);
    border-radius: 12px;
    margin-bottom: 14px;
    border: 1.5px solid var(--border);
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    transition: border-color 0.2s;
  }
  .q-card.answered { border-color: var(--teal); }
  .q-card.correct  { border-color: var(--green); }
  .q-card.wrong    { border-color: var(--red); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 16px 18px 14px;
  }
  .q-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--card);
    background: var(--navy);
    border-radius: 6px;
    padding: 3px 8px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .q-text {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.45;
    color: var(--text);
  }

  .options { padding: 0 14px 14px; display: flex; flex-direction: column; gap: 8px; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 13px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .option:hover { border-color: var(--teal); background: #EFF9FC; }
  .option.selected { border-color: var(--teal); background: #EFF9FC; }
  .option.correct-ans { border-color: var(--green); background: var(--green-light); }
  .option.wrong-ans   { border-color: var(--red); background: var(--red-light); text-decoration: line-through; opacity: 0.7; }

  .opt-letter {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--teal);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .option.correct-ans .opt-letter { color: var(--green); }
  .option.wrong-ans   .opt-letter { color: var(--red); }
  .opt-text { font-size: 14px; line-height: 1.4; color: var(--text); }

  .feedback {
    display: none;
    margin: 0 14px 14px;
    padding: 10px 13px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
    font-style: italic;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: var(--green-light); border-left: 3px solid var(--green); color: #166534; }
  .feedback.wrong-fb   { background: var(--red-light);   border-left: 3px solid var(--red);   color: #991B1B; }

  /* SUBMIT */
  .submit-wrap { padding: 8px 0 0; }
  .submit-btn {
    width: 100%;
    padding: 15px;
    background: var(--navy);
    color: #fff;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    text-transform: uppercase;
  }
  .submit-btn:hover:not(:disabled) { background: var(--navy-light); }
  .submit-btn:active:not(:disabled) { transform: scale(0.98); }
  .submit-btn:disabled { background: #94A3B8; cursor: not-allowed; }

  /* VERDICT */
  .verdict-box {
    display: none;
    margin-top: 20px;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }
  .verdict-box.show { display: block; }
  .verdict-score {
    font-family: 'Space Mono', monospace;
    font-size: 36px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 6px;
  }
  .verdict-pct {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--teal);
    margin-bottom: 12px;
    letter-spacing: 0.05em;
  }
  .verdict-msg {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.5;
  }

  /* OVERLAY */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(27,42,74,0.88);
    z-index: 500;
    align-items: center;
    justify-content: center;
  }
  .overlay.active { display: flex; }
  .overlay-box {
    background: var(--card);
    border-radius: 16px;
    padding: 36px 32px;
    text-align: center;
    max-width: 300px;
    width: 90%;
  }
  .spinner {
    width: 44px;
    height: 44px;
    border: 4px solid var(--border);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sync-msg {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: 0.04em;
  }
  .sync-msg.success { color: var(--green); font-size: 15px; }
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="spinner" id="spinner"></div>
    <div class="sync-msg" id="syncMsg">Buffering...</div>
  </div>
</div>

<div class="header">
  <div class="teal-bar"></div>
  <div class="header-inner">
    <div class="header-title">
      <span>District 8 — Weekly Check-In</span>
      P03W3 Pop Quiz
    </div>
    <div class="score-chip" id="scoreChip">0 / 10</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0 of 10 answered</div>
  </div>
</div>

<div class="main">

  <div class="name-card">
    <label class="name-label" for="nameInput">Your Name</label>
    <input class="name-input" id="nameInput" type="text" placeholder="First and last name" autocomplete="off">
  </div>

  <div id="quizContainer"></div>

  <div class="submit-wrap">
    <button class="submit-btn" id="submitBtn" disabled>Submit Answers</button>
  </div>

  <div class="verdict-box" id="verdictBox">
    <div class="verdict-score" id="verdictScore"></div>
    <div class="verdict-pct" id="verdictPct"></div>
    <div class="verdict-msg" id="verdictMsg"></div>
  </div>

</div>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzmcP_mKbuBt-pY1zMGhgrgOWae3uI72PreeTaQTHJDc1Uj4oGq424zRRsdZ8YKo8c1/exec";
const PERIOD_WEEK = "P03W3";

const questions = [
  {
    q: "During the C054 Crackers reset, how are Ritz Fresh Stacks changing on the shelf?",
    opts: [
      "They are being deleted from the planogram entirely",
      "They are moving from single-shelf facings to over-under facings",
      "They are relocating to the bottom shelf to make room for Goldfish",
      "They are consolidating from two positions into one facing"
    ],
    correct: 1,
    feedback: "Ritz Fresh Stacks — both the original and the regular Fresh Stacks — are moving from single-shelf facings to over-under facings. Goldfish is also shifting up and Private Selection Crackers are coming off the set entirely."
  },
  {
    q: "What is the critical operational rule for ALL refrigerated and frozen sets this week?",
    opts: [
      "Product must not be left out for more than 45 minutes",
      "All frozen sets must be worked before 10 AM",
      "Product must not be left out for more than 20 minutes",
      "A store manager must be present for all cooler resets"
    ],
    correct: 2,
    feedback: "20 minutes is the hard limit for refrigerated and frozen sets. Plan your pulls in manageable chunks — this is a hard rule, not a guideline."
  },
  {
    q: "In C343 Grab and Go, which item is being added and which is being removed?",
    opts: [
      "Turkey BLT is adding; Blueberry Walnut Salad is out",
      "Blueberry Walnut Salad is adding; Turkey BLT is out",
      "Pesto Artichoke Pasta Salad is adding; Blueberry Walnut Salad is out",
      "Both Blueberry Walnut Salad and Turkey BLT are being removed"
    ],
    correct: 1,
    feedback: "Blueberry Walnut Salad is the new add to C343 Grab and Go. Turkey BLT is the delete. Taylor Farms Division 701 Boar's Head changes should be noted separately."
  },
  {
    q: "In C406 Bakery Cookies, which two items are being deleted from the set?",
    opts: [
      "Biscoff and ST GF Oatmeal Bites",
      "10-count Oatmeal Soft Top and Biscoff",
      "Banana Nut Soft Top and Black and White",
      "Black and White and ST GF Oatmeal Bites"
    ],
    correct: 2,
    feedback: "Banana Nut Soft Top and Black and White are the deletes in C406. The three new adds are the 10-count Oatmeal Soft Top, Biscoff, and the ST GF Oatmeal Bites."
  },
  {
    q: "In C451 Bulk Deli, where is the five-dollar Grab N Go moving — and which store type does this apply to?",
    opts: [
      "Moving to the bottom shelf; applies to all stores",
      "Moving to the top shelf; Fred Meyer locations only",
      "Moving to the end cap; QFC locations only",
      "Moving to the middle shelf; applies to all stores"
    ],
    correct: 1,
    feedback: "The five-dollar Grab N Go is moving to the top shelf, and that applies to Fred Meyer locations only — which is us."
  },
  {
    q: "In C454 Snacks, what flavor is Pretzelized swapping out, and what is it being replaced with?",
    opts: [
      "Swapping Everything Bagel for Jalapeño",
      "Swapping Aged Cheddar for Buffalo",
      "Swapping Buffalo for Aged Cheddar",
      "Swapping Jalapeño for Zesty Dill"
    ],
    correct: 2,
    feedback: "Pretzelized is swapping Buffalo out for Aged Cheddar. Separately, Parm Crisps is swapping Jalapeño for Everything Bagel, and Twigz Zesty Dill is a new add."
  },
  {
    q: "In the C086 Baby Food bay layout, what three brands are on the top shelf of the center pouch block?",
    opts: [
      "Simple Truth, Happy Baby, Earth's Best",
      "Gerber, Beechnut, Cerebelly",
      "Serenity, Peter Rabbit, Cerebelly",
      "Happy Baby, Serenity, Simple Truth"
    ],
    correct: 2,
    feedback: "The top shelf of the center pouch block holds Serenity, Peter Rabbit, and Cerebelly. The leading section below them is Simple Truth, followed by Happy Baby and Earth's Best."
  },
  {
    q: "Stores with Once Upon a Farm refrigerated coolers need assortment updates. What must happen to any items pulled from those coolers?",
    opts: [
      "They should be staged on the sales floor until the reset is complete",
      "They must be placed immediately in the backroom dairy cooler",
      "They should be returned to the vendor for credit",
      "They can remain on the pallet for up to 45 minutes before being moved"
    ],
    correct: 1,
    feedback: "Any items pulled from the Once Upon a Farm refrigerated coolers must go immediately to the backroom dairy cooler. Two items from C290 NF Dairy — Pear-Y Blueberry Spinach and Rasp-Pear-Y Kale — are being integrated into shelf one of those coolers on the VC-56 set."
  },
  {
    q: "When building C180 Vitamins lower shelves, what is the required first action before setting Nature's Bounty in the center?",
    opts: [
      "Set Nature's Made all the way to the left first",
      "Pull all of Nature's Truth to open up the middle of the bay",
      "Adjust shelf notches in bays one and two before placing any product",
      "Remove Airborne and Natrol from the upper shelves first"
    ],
    correct: 1,
    feedback: "Pull all of Nature's Truth first to open up the middle of the bay, then set Nature's Bounty. Do it out of sequence and you're backing yourself into a corner with nowhere to work."
  },
  {
    q: "Looking ahead — where should you look this week to find the link, tutorial, and user guide for the Vitamins planogram app?",
    opts: [
      "Pinned post in the District 8 Teams channel",
      "The 'Just Vitamins' folder in the dump bin",
      "Emailed directly from Tyson to each rep",
      "The Compass Maintenance library under P03W3"
    ],
    correct: 1,
    feedback: "There's a folder in the dump bin called 'Vitamins' — it has the app link, a tutorial, and a user guide. That's your starting point for getting set up before the Vitamin resets."
  }
];

const answers = new Array(questions.length).fill(null);
let submitted = false;

function buildQuiz() {
  const container = document.getElementById('quizContainer');
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `card-${i}`;

    const letters = ['A', 'B', 'C', 'D'];
    const optsHTML = q.opts.map((opt, j) => `
      <div class="option" id="opt-${i}-${j}" onclick="selectOption(${i}, ${j})">
        <span class="opt-letter">${letters[j]}</span>
        <span class="opt-text">${opt}</span>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">Q${i + 1}</span>
        <span class="q-text">${q.q}</span>
      </div>
      <div class="options">${optsHTML}</div>
      <div class="feedback" id="fb-${i}"></div>
    `;
    container.appendChild(card);
  });
}

function selectOption(qi, oi) {
  if (submitted) return;

  // Clear previous selection for this question
  if (answers[qi] !== null) {
    document.getElementById(`opt-${qi}-${answers[qi]}`).classList.remove('selected');
  }

  answers[qi] = oi;
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
  document.getElementById(`card-${qi}`).classList.add('answered');

  updateProgress();
  checkSubmitEnabled();
}

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  const pct = (answered / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${answered} of ${questions.length} answered`;
  document.getElementById('scoreChip').textContent = `${answered} / ${questions.length}`;
}

function checkSubmitEnabled() {
  const allAnswered = answers.every(a => a !== null);
  const hasName = document.getElementById('nameInput').value.trim().length > 0;
  document.getElementById('submitBtn').disabled = !(allAnswered && hasName);
}

document.getElementById('nameInput').addEventListener('input', checkSubmitEnabled);

function submitQuiz() {
  if (submitted) return;
  submitted = true;
  document.getElementById('submitBtn').disabled = true;

  // Score
  let correct = 0;
  const missed = [];
  questions.forEach((q, i) => {
    const card = document.getElementById(`card-${i}`);
    const selectedOpt = document.getElementById(`opt-${i}-${answers[i]}`);
    const correctOpt = document.getElementById(`opt-${i}-${q.correct}`);
    const fb = document.getElementById(`fb-${i}`);

    // Lock all options
    document.querySelectorAll(`[id^="opt-${i}-"]`).forEach(el => {
      el.style.cursor = 'default';
      el.onclick = null;
    });

    if (answers[i] === q.correct) {
      correct++;
      card.classList.remove('answered');
      card.classList.add('correct');
      selectedOpt.classList.remove('selected');
      selectedOpt.classList.add('correct-ans');
      fb.textContent = '✓ ' + q.feedback;
      fb.className = 'feedback show correct-fb';
    } else {
      card.classList.remove('answered');
      card.classList.add('wrong');
      selectedOpt.classList.remove('selected');
      selectedOpt.classList.add('wrong-ans');
      correctOpt.classList.add('correct-ans');
      fb.textContent = '✗ ' + q.feedback;
      fb.className = 'feedback show wrong-fb';
      missed.push(`Q${i + 1}`);
    }
  });

  const pct = Math.round((correct / questions.length) * 100);
  const verdicts = {
    10: "Perfect. You were paying attention.",
    9: "Solid. Review the ones you missed.",
    8: "Solid. Review the ones you missed.",
    7: "Watch the presentation again — key details were missed.",
    6: "Watch the presentation again — key details were missed.",
  };
  const verdictText = verdicts[correct] || "Go back and rewatch the full presentation before your next shift.";

  // Show overlay
  const overlay = document.getElementById('overlay');
  overlay.classList.add('active');

  // POST to Sheets
  const payload = {
    periodWeek: PERIOD_WEEK,
    name: document.getElementById('nameInput').value.trim(),
    score: correct,
    outOf: questions.length,
    percent: pct + '%',
    missed: missed.join(', ') || 'None'
  };

  fetch(SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(() => {});

  setTimeout(() => {
    document.getElementById('spinner').style.display = 'none';
    const msg = document.getElementById('syncMsg');
    msg.textContent = 'Your results have been submitted.';
    msg.className = 'sync-msg success';
    setTimeout(() => {
      overlay.classList.remove('active');

      // Show verdict
      document.getElementById('verdictScore').textContent = `${correct} / ${questions.length}`;
      document.getElementById('verdictPct').textContent = `${pct}% — ${missed.length === 0 ? 'No missed questions' : 'Missed: ' + missed.join(', ')}`;
      let finalVerdict = verdictText;
      if (pct < 60) finalVerdict += ' Screenshot this and send to Tyson.';
      document.getElementById('verdictMsg').textContent = finalVerdict;

      const vbox = document.getElementById('verdictBox');
      vbox.className = 'verdict-box show';
      vbox.style.background = correct >= 8 ? 'var(--green-light)' : correct >= 6 ? 'var(--orange-light)' : 'var(--red-light)';
      vbox.style.border = `2px solid ${correct >= 8 ? 'var(--green)' : correct >= 6 ? 'var(--orange)' : 'var(--red)'}`;
      vbox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      document.getElementById('scoreChip').textContent = `${correct} / ${questions.length}`;
    }, 2000);
  }, 1500);
}

document.getElementById('submitBtn').addEventListener('click', submitQuiz);

buildQuiz();
</script>
</body>
</html>
