<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P06W1 Team Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B2A4A;
    --teal:#0891B2;
    --orange:#F59E0B;
    --light:#F0F4F8;
    --red:#DC2626;
    --green:#16A34A;
    --ink:#1B2A4A;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--light);
    color:var(--ink);
    font-family:'DM Sans',system-ui,sans-serif;
    line-height:1.5;
    padding:0 0 64px;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 16px;}
  header{
    background:var(--navy);
    color:#fff;
    padding:28px 16px 24px;
    border-bottom:4px solid var(--teal);
  }
  header .wrap{padding:0 16px;}
  .kicker{
    font-family:'Space Mono',monospace;
    font-weight:700;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--orange);
    font-size:13px;
    margin:0 0 6px;
  }
  header h1{
    font-family:'Space Mono',monospace;
    font-weight:700;
    font-size:24px;
    margin:0 0 6px;
  }
  header p{margin:0;font-size:15px;color:#cbd5e1;}
  .namebox{
    background:var(--card);
    border:1px solid #d8e0ea;
    border-radius:12px;
    padding:16px;
    margin:18px 0;
  }
  label.fieldlabel{
    display:block;
    font-family:'Space Mono',monospace;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:1px;
    font-size:12px;
    color:var(--teal);
    margin:0 0 8px;
  }
  #name{
    width:100%;
    padding:12px 14px;
    font-family:'DM Sans',sans-serif;
    font-size:16px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    outline:none;
  }
  #name:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(8,145,178,.15);}
  .progress-shell{
    position:sticky;top:0;z-index:5;
    background:var(--light);
    padding:12px 0 10px;
  }
  .progress-track{
    height:10px;background:#dbe3ee;border-radius:999px;overflow:hidden;
    border:1px solid #cbd5e1;
  }
  .progress-fill{
    height:100%;width:0;background:var(--teal);
    transition:width .25s ease;
  }
  .progress-label{
    font-family:'Space Mono',monospace;font-size:12px;font-weight:700;
    color:var(--navy);margin-top:6px;letter-spacing:1px;
  }
  .q{
    background:var(--card);
    border:1px solid #d8e0ea;
    border-radius:12px;
    padding:18px 16px;
    margin:14px 0;
  }
  .q-num{
    font-family:'Space Mono',monospace;font-weight:700;font-size:12px;
    color:var(--orange);letter-spacing:1px;text-transform:uppercase;
  }
  .q-text{font-weight:700;font-size:17px;margin:6px 0 14px;}
  .opt{
    display:flex;align-items:flex-start;gap:10px;
    border:1px solid #d8e0ea;border-radius:8px;
    padding:12px;margin:8px 0;cursor:pointer;
    transition:border-color .15s,background .15s;
  }
  .opt:hover{border-color:var(--teal);}
  .opt input{margin-top:3px;accent-color:var(--teal);width:18px;height:18px;flex:0 0 auto;}
  .opt .opt-letter{font-family:'Space Mono',monospace;font-weight:700;color:var(--teal);}
  .opt.correct{background:#e9f9ef;border-color:var(--green);}
  .opt.wrong{background:#fdecec;border-color:var(--red);}
  .opt.wrong .opt-body{text-decoration:line-through;color:#9b1c1c;}
  .opt.correct .opt-letter{color:var(--green);}
  .feedback{
    margin-top:10px;padding:11px 12px;border-radius:8px;
    font-size:14px;display:none;
  }
  .feedback.show{display:block;}
  .feedback.good{background:#e9f9ef;border-left:4px solid var(--green);}
  .feedback.bad{background:#fdecec;border-left:4px solid var(--red);}
  .feedback .tag{
    font-family:'Space Mono',monospace;font-weight:700;font-size:12px;
    text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:3px;
  }
  .feedback.good .tag{color:var(--green);}
  .feedback.bad .tag{color:var(--red);}
  #submitBtn{
    display:block;width:100%;
    background:var(--orange);color:#1a1a1a;
    font-family:'Space Mono',monospace;font-weight:700;
    text-transform:uppercase;letter-spacing:1px;font-size:16px;
    border:none;border-radius:10px;padding:16px;margin:22px 0 8px;
    cursor:pointer;
  }
  #submitBtn:disabled{background:#cbd5e1;color:#7b8794;cursor:not-allowed;}
  #results{
    display:none;background:var(--navy);color:#fff;
    border-radius:14px;padding:24px 18px;margin:18px 0;text-align:center;
  }
  #results.show{display:block;}
  .score-big{font-family:'Space Mono',monospace;font-weight:700;font-size:46px;line-height:1;}
  .score-sub{color:var(--teal);font-family:'Space Mono',monospace;font-weight:700;letter-spacing:1px;margin:6px 0 14px;}
  .verdict{font-size:17px;font-weight:500;}
  /* overlay */
  .overlay{
    position:fixed;inset:0;background:rgba(27,42,74,.92);
    display:none;align-items:center;justify-content:center;z-index:50;
  }
  .overlay.show{display:flex;}
  .overlay-box{
    background:var(--card);border-radius:16px;padding:34px 30px;
    text-align:center;min-width:240px;
  }
  .spinner{
    width:46px;height:46px;margin:0 auto 16px;
    border:5px solid #d8e0ea;border-top-color:var(--teal);
    border-radius:50%;animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .sync-msg{
    font-family:'Space Mono',monospace;font-weight:700;font-size:16px;
    color:var(--navy);letter-spacing:.5px;
  }
  .sync-msg.done{color:var(--green);}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <p class="kicker">Field Execution &mdash; Districts 6 &amp; 8</p>
    <h1>P06W1 Team Quiz</h1>
    <p>Ten questions on this week's briefing. Takes about three minutes.</p>
  </div>
</header>

<div class="wrap">
  <div class="namebox">
    <label class="fieldlabel" for="name">Your Name</label>
    <input id="name" type="text" autocomplete="name" placeholder="First and last name" />
  </div>

  <div class="progress-shell">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0 of 10 answered</div>
  </div>

  <div id="quiz"></div>

  <button id="submitBtn" disabled>Answer all questions to submit</button>

  <div id="results">
    <div class="score-big" id="scoreBig">0 / 10</div>
    <div class="score-sub" id="scoreSub">0%</div>
    <div class="verdict" id="verdict"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="spinner" id="spinner"></div>
    <div class="sync-msg" id="syncMsg">Buffering&hellip;</div>
  </div>
</div>

<script>
  const PERIOD_WEEK = "P06W1";
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzmcP_mKbuBt-pY1zMGhgrgOWae3uI72PreeTaQTHJDc1Uj4oGq424zRRsdZ8YKo8c1/exec";

  const QUESTIONS = [
    {
      q: "Why do wet cat and cat treats have to be completed on the same visit?",
      options: [
        "Because the lickable treat complements are migrating out of wet cat and into treats.",
        "Because they ship in the same Vestcom box.",
        "Because they're both eight-hour sets.",
        "Because the store won't sign off one without the other."
      ],
      correct: 0,
      why: "The lickable treat complements \u2014 sixteen UPCs \u2014 are moving permanently out of wet cat into treats. Split them across visits and you'll leave a gap on the shelf."
    },
    {
      q: "On the wet cat set, where does most of your movement happen?",
      options: [
        "Shelves 3 through 8.",
        "Shelves 1 and 2.",
        "The top two shelves only.",
        "The endcaps."
      ],
      correct: 0,
      why: "Shelves 1 and 2 have minimal movement \u2014 shelves 3 through 8 carry most of the work, so plan your time there."
    },
    {
      q: "Dry cat is a straightforward write \u2014 except at which stores?",
      options: [
        "Twenty-foot-plus automated stores, which get a store-specific planogram.",
        "Eight-foot and smaller stores.",
        "Stores with a glass-shelf conversion.",
        "Stores renaming to Department 03."
      ],
      correct: 0,
      why: "Twenty-foot-plus automated stores receive store-specific planograms and more movement. Everywhere else it's a standard four-new, six-delete write."
    },
    {
      q: "On self-checkout kits A and D, how is candy and salty snack set?",
      options: [
        "Alternating in runs of three or more, with salty snack on the top shelf.",
        "Candy on top, salty snack on the bottom.",
        "All candy on kit A, all salty snack on kit D.",
        "Alternating every other facing."
      ],
      correct: 0,
      why: "Kits A and D alternate candy and salty snack in runs of three or more, and the salty snack sits on the top shelf."
    },
    {
      q: "At conversion stores where the glass shelves were discarded, where do specialty bath items WITHOUT a hanger go?",
      options: [
        "On the base deck.",
        "On the grid wall, doubled up.",
        "Back in the Vestcom box for return.",
        "Set aside and sent to the hotline."
      ],
      correct: 0,
      why: "Items with a hanger go on the grid wall in the lower-left two-foot space; anything without a hanger sits on the base deck."
    },
    {
      q: "At store 391, the Innovations location change moves the set to where?",
      options: [
        "From the back end (end 15) to the middle end (end 19), at aisle 20L.3.",
        "From the middle end (end 19) to the back end (end 15).",
        "To the front-of-store endcap.",
        "To the checkstand at aisle 1."
      ],
      correct: 0,
      why: "At store 391, move Innovations from the back end, end 15, to the middle end, end 19, at aisle 20L.3 \u2014 and verify placement."
    },
    {
      q: "Which District 6 stores are missing fruit photos and need action this week?",
      options: [
        "214, 351, 652, and 654.",
        "163, 286, 486, and 657.",
        "19, 28, and 459.",
        "49, 652, and 657."
      ],
      correct: 0,
      why: "Stores 214, 351, 652, and 654 are missing fruit photos as of this report. I've sent the reminder and signup emails \u2014 please get those handled."
    },
    {
      q: "This week's call-downs are all Spirits and all in District 6. Which schedule is right?",
      options: [
        "657 Tuesday, 214 Wednesday, 351 Thursday.",
        "214 Tuesday, 351 Wednesday, 657 Thursday.",
        "351 Monday, 657 Tuesday, 214 Wednesday.",
        "459 Tuesday, 214 Wednesday, 351 Thursday."
      ],
      correct: 0,
      why: "All three are District 6 Spirits call-downs: store 657 Tuesday, store 214 Wednesday, store 351 Thursday. Store 459 in District 8 is a Spirits call-down later, on the ninth."
    },
    {
      q: "Under the new process, what do you do with Empire materials (Fresh Meat and Telecom) that show up in your boxes?",
      options: [
        "Hand them directly to the department head or the vendor \u2014 don't leave them on the Kompass cart.",
        "Leave them on the Kompass cart for Empire to grab.",
        "Box them up and send them to the hotline.",
        "Hold them until the Monday call."
      ],
      correct: 0,
      why: "Empire materials no longer go on the Kompass cart. Hand them straight to the department head, or directly to the vendor."
    },
    {
      q: "What's the look-ahead heads-up for store 23, and what should you NOT do yet?",
      options: [
        "A cookies-and-crackers remapping is coming \u2014 don't install the strips until I confirm labor ownership.",
        "A specialty bath test is coming \u2014 set it this week.",
        "A new checklane blitz starts \u2014 begin immediately.",
        "A dry cat automation update \u2014 install as soon as the box arrives."
      ],
      correct: 0,
      why: "Store 23 has a cookies-and-crackers remapping slated for next week, pulling product behind the column. The strips arrive in your next box \u2014 but don't install them until I confirm labor ownership."
    }
  ];

  const LETTERS = ["A","B","C","D"];
  const answers = new Array(QUESTIONS.length).fill(null);
  let locked = false;

  const quizEl = document.getElementById("quiz");
  const nameEl = document.getElementById("name");
  const submitBtn = document.getElementById("submitBtn");
  const progressFill = document.getElementById("progressFill");
  const progressLabel = document.getElementById("progressLabel");

  QUESTIONS.forEach((item, qi) => {
    const card = document.createElement("div");
    card.className = "q";
    card.id = "q" + qi;
    let html = '<div class="q-num">Question ' + (qi + 1) + '</div>';
    html += '<div class="q-text">' + item.q + '</div>';
    item.options.forEach((opt, oi) => {
      html += '<label class="opt" id="opt-' + qi + '-' + oi + '">' +
                '<input type="radio" name="q' + qi + '" value="' + oi + '">' +
                '<span class="opt-letter">' + LETTERS[oi] + '</span>' +
                '<span class="opt-body">' + opt + '</span>' +
              '</label>';
    });
    html += '<div class="feedback" id="fb-' + qi + '"></div>';
    card.innerHTML = html;
    quizEl.appendChild(card);
  });

  quizEl.addEventListener("change", function (e) {
    if (locked) return;
    if (e.target && e.target.type === "radio") {
      const qi = parseInt(e.target.name.slice(1), 10);
      answers[qi] = parseInt(e.target.value, 10);
      updateProgress();
    }
  });
  nameEl.addEventListener("input", updateProgress);

  function updateProgress() {
    const answered = answers.filter(a => a !== null).length;
    const pct = Math.round((answered / QUESTIONS.length) * 100);
    progressFill.style.width = pct + "%";
    progressLabel.textContent = answered + " of " + QUESTIONS.length + " answered";
    const ready = answered === QUESTIONS.length && nameEl.value.trim().length > 0;
    submitBtn.disabled = !ready;
    submitBtn.textContent = ready ? "Submit Quiz"
      : (nameEl.value.trim().length === 0 ? "Enter your name to submit" : "Answer all questions to submit");
  }

  submitBtn.addEventListener("click", function () {
    if (submitBtn.disabled || locked) return;
    locked = true;
    submitBtn.disabled = true;

    const overlay = document.getElementById("overlay");
    const spinner = document.getElementById("spinner");
    const syncMsg = document.getElementById("syncMsg");
    spinner.style.display = "block";
    syncMsg.className = "sync-msg";
    syncMsg.innerHTML = "Buffering&hellip;";
    overlay.classList.add("show");

    let postFailed = false;
    const result = gradeAndBuildPayload();

    fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(result.payload)
    }).catch(function () { postFailed = true; });

    setTimeout(function () {
      spinner.style.display = "none";
      syncMsg.className = "sync-msg done";
      syncMsg.textContent = "Your results have been submitted.";
      setTimeout(function () {
        overlay.classList.remove("show");
        revealResults(result, postFailed);
      }, 2000);
    }, 1500);
  });

  function gradeAndBuildPayload() {
    let score = 0;
    const missed = [];
    QUESTIONS.forEach((item, qi) => {
      if (answers[qi] === item.correct) score += 1;
      else missed.push(qi + 1);
    });
    const outOf = QUESTIONS.length;
    const percent = Math.round((score / outOf) * 100);
    const payload = {
      "Timestamp": new Date().toISOString(),
      "Period/Week": PERIOD_WEEK,
      "Name": nameEl.value.trim(),
      "Score": score,
      "Out Of": outOf,
      "Percent": percent,
      "Missed Questions": missed.length ? missed.join(", ") : "None"
    };
    return { score: score, outOf: outOf, percent: percent, missed: missed, payload: payload };
  }

  function revealResults(result, postFailed) {
    QUESTIONS.forEach((item, qi) => {
      document.querySelectorAll('input[name="q' + qi + '"]').forEach(inp => inp.disabled = true);
      const chosen = answers[qi];
      const correctOpt = document.getElementById("opt-" + qi + "-" + item.correct);
      correctOpt.classList.add("correct");
      const fb = document.getElementById("fb-" + qi);
      if (chosen === item.correct) {
        fb.className = "feedback good show";
        fb.innerHTML = '<span class="tag">Correct &#10003;</span>' + item.why;
      } else {
        const chosenOpt = document.getElementById("opt-" + qi + "-" + chosen);
        if (chosenOpt) chosenOpt.classList.add("wrong");
        fb.className = "feedback bad show";
        fb.innerHTML = '<span class="tag">Missed &#10007;</span>' + item.why;
      }
    });

    document.getElementById("scoreBig").textContent = result.score + " / " + result.outOf;
    document.getElementById("scoreSub").textContent = result.percent + "%";

    let verdict;
    if (result.score === 10) verdict = "Perfect. You were paying attention.";
    else if (result.score >= 8) verdict = "Solid. Review the ones you missed.";
    else if (result.score >= 6) verdict = "Watch the presentation again \u2014 key details were missed.";
    else verdict = "Go back and rewatch the full presentation before your next shift.";
    if (postFailed) verdict += " Screenshot this and send it to me.";

    document.getElementById("verdict").textContent = verdict;
    const res = document.getElementById("results");
    res.classList.add("show");
    submitBtn.style.display = "none";
    res.scrollIntoView({ behavior: "smooth", block: "start" });
  }
</script>
</body>
</html>
