<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P04W1 Pop Quiz — District 8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1B2A4A;
    --teal: #0891B2;
    --orange: #F59E0B;
    --bg: #F0F4F8;
    --red: #DC2626;
    --green: #059669;
    --card: #ffffff;
    --muted: #5B6B80;
    --border: #D6DEE8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--navy); font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 20px 16px 80px; }
  header { background: var(--navy); color: #fff; border-radius: 12px; padding: 20px 18px; margin-bottom: 16px; }
  header .tag { font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 2px; color: var(--teal); text-transform: uppercase; }
  header h1 { font-family: 'Space Mono', monospace; font-size: 22px; margin: 4px 0 6px; font-weight: 700; }
  header p { margin: 0; font-size: 14px; color: #CBD5E1; }
  .progress-wrap { background: var(--border); height: 6px; border-radius: 999px; overflow: hidden; margin: 14px 0 18px; }
  .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--teal), var(--orange)); transition: width .25s ease; }
  .name-card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid var(--border); }
  .name-card label { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 8px; }
  .name-card input { width: 100%; padding: 12px 14px; font-size: 16px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border); border-radius: 8px; outline: none; }
  .name-card input:focus { border-color: var(--teal); }
  .q { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 14px; border: 1px solid var(--border); }
  .q-num { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 1.5px; color: var(--teal); text-transform: uppercase; margin-bottom: 6px; }
  .q-text { font-size: 16px; font-weight: 500; line-height: 1.4; margin-bottom: 14px; }
  .opt { display: block; padding: 12px 14px; margin-bottom: 8px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 15px; line-height: 1.35; transition: all .15s ease; background: #fff; }
  .opt:hover { border-color: var(--teal); background: #F8FAFB; }
  .opt input { margin-right: 10px; accent-color: var(--teal); }
  .opt.selected { border-color: var(--teal); background: #ECFEFF; }
  .opt.correct { border-color: var(--green); background: #D1FAE5; color: #064E3B; }
  .opt.wrong { border-color: var(--red); background: #FEE2E2; color: #7F1D1D; text-decoration: line-through; }
  .feedback { margin-top: 10px; padding: 10px 12px; border-radius: 8px; font-size: 14px; line-height: 1.4; display: none; }
  .feedback.show { display: block; }
  .feedback.good { background: #D1FAE5; color: #064E3B; }
  .feedback.bad { background: #FEF3C7; color: #7C2D12; }
  .submit-btn { width: 100%; padding: 16px; font-size: 16px; font-weight: 700; font-family: 'Space Mono', monospace; letter-spacing: 1px; text-transform: uppercase; background: var(--orange); color: var(--navy); border: none; border-radius: 12px; cursor: pointer; transition: all .2s ease; }
  .submit-btn:disabled { background: #D6DEE8; color: #94A3B8; cursor: not-allowed; }
  .submit-btn:not(:disabled):hover { background: #D97706; color: #fff; }
  .result-card { background: var(--navy); color: #fff; border-radius: 12px; padding: 24px 18px; margin-top: 18px; display: none; text-align: center; }
  .result-card.show { display: block; }
  .result-card .score { font-family: 'Space Mono', monospace; font-size: 42px; font-weight: 700; color: var(--orange); margin: 0; }
  .result-card .pct { font-family: 'Space Mono', monospace; font-size: 14px; color: var(--teal); letter-spacing: 2px; }
  .result-card .verdict { font-size: 16px; line-height: 1.5; margin-top: 12px; }
  .locked .opt { cursor: default; }
  .locked .opt:hover { border-color: var(--border); background: #fff; }
  .locked .opt.selected:hover { border-color: var(--teal); background: #ECFEFF; }

  /* Submit overlay */
  .overlay { position: fixed; inset: 0; background: rgba(27, 42, 74, 0.92); display: none; align-items: center; justify-content: center; z-index: 1000; }
  .overlay.show { display: flex; }
  .overlay-box { background: #fff; border-radius: 16px; padding: 32px 28px; text-align: center; min-width: 260px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .spinner { width: 48px; height: 48px; border: 4px solid #E5E7EB; border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  .spinner.hidden { display: none; }
  .sync-msg { font-family: 'Space Mono', monospace; font-size: 14px; letter-spacing: 1px; color: var(--navy); }
  .sync-msg.done { color: var(--green); font-weight: 700; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="tag">Period 04 / Week 1</div>
    <h1>District 8 Pop Quiz</h1>
    <p>10 questions. Takes about 3 minutes. Results come to Tyson automatically.</p>
  </header>

  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

  <div class="name-card">
    <label for="nameInput">Your Name</label>
    <input type="text" id="nameInput" placeholder="First and last" autocomplete="name">
  </div>

  <div id="quiz"></div>

  <button class="submit-btn" id="submitBtn" disabled>Submit Quiz</button>

  <div class="result-card" id="resultCard">
    <div class="pct" id="pctLine">SCORE</div>
    <div class="score" id="scoreLine">0 / 10</div>
    <div class="verdict" id="verdictLine"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="spinner" id="spinner"></div>
    <div class="sync-msg" id="syncMsg">Buffering...</div>
  </div>
</div>

<script>
const PERIOD_WEEK = "P04W1";
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzmcP_mKbuBt-pY1zMGhgrgOWae3uI72PreeTaQTHJDc1Uj4oGq424zRRsdZ8YKo8c1/exec";

const questions = [
  {
    q: "How many deletes does C202 Gondola Candy have this week?",
    opts: ["46", "60", "112", "49"],
    a: 2,
    exp: "C202 has 112 deletes — the biggest single number of the week, which is why 'pull deletes first' is the action item."
  },
  {
    q: "What's the action item for C202 Gondola Candy?",
    opts: [
      "Set new items first, then pull deletes at the end",
      "Pull deletes first before setting, using the Compass delete list",
      "Wait for closeout tags before pulling any product",
      "Reset the checklane strips before touching the gondola"
    ],
    a: 1,
    exp: "Not all deletes have closeout tags, so pull them first using the Compass delete list to clear space before you start setting."
  },
  {
    q: "Which District 8 store gets UPDATE strips on C388 NF Milk instead of a standard NII?",
    opts: ["Store 658", "Store 391", "Store 459", "Store 682"],
    a: 2,
    exp: "Store 459 is the exception — C388 NF Milk runs as UPDATE strips as part of the C060 Milkhouse reflow. Every other District 8 store executes C388 as a standard new item introduction."
  },
  {
    q: "Where does Almond Roca end up on the new C202 set?",
    opts: [
      "Shifts 2 bays toward the chocolate section, stays on the bottom shelf",
      "Shifts 2 bays toward chocolate and moves up to the top shelf",
      "Stays in place — no movement this reset",
      "Moves to the checklane NII strips"
    ],
    a: 0,
    exp: "Movement on C202 is mostly lateral. Almond Roca shifts 2 bays toward chocolate but stays on the bottom shelf."
  },
  {
    q: "How are the hours budgeted for C050 Baked Breads, and what does it run with?",
    opts: [
      "Runs with C671 NF Bread; hours are NOT included — budget extra time separately",
      "Runs with C671 NF Bread; the 12 hours ALREADY includes the C671 update strips",
      "Runs with C201 Checklane; C671 hours are a separate line item",
      "Runs as a standalone set with no cross-commodity work"
    ],
    a: 1,
    exp: "C050 runs with C671 NF Bread, and the 12 hours already covers the C671 update strips. Don't treat them separately or budget extra time."
  },
  {
    q: "What leads the top shelf on the new C011 RTD Tea set?",
    opts: ["Starbucks", "Pure Leaf", "Arizona 22oz", "Guayaki Yerba Mate"],
    a: 3,
    exp: "Guayaki Yerba Mate takes the top shelf. Pure Leaf drops to shelf 5, Arizona 22oz moves to SRP, and Shelves 1 & 2 mirror each other in a Starbucks/Arizona flow."
  },
  {
    q: "What's changing on Bitchin Dips in C466 Hummus/Salsa?",
    opts: [
      "Adding 3 SKUs of new 9oz Bitchin Dips (replacing 7oz); squeeze bottles coming out",
      "Adding 3 SKUs of new 7oz Bitchin Dips (replacing 9oz); squeeze bottles staying",
      "Removing Bitchin from the set entirely",
      "Adding new squeeze bottles; discontinuing the 9oz size"
    ],
    a: 0,
    exp: "Three new 9oz Bitchin Dip SKUs replace the 7oz, and the Bitchin squeeze bottles are being removed. Queso and cheese dip also move off Hummus-only POGs onto Salsa/Guac POGs."
  },
  {
    q: "What's the required format for the hotline email subject line?",
    opts: [
      "Store name and district only",
      "'Reset Completion/Compliancy - Store ###' with the exact store number",
      "Category number followed by the date",
      "Just the COM# and the week"
    ],
    a: 1,
    exp: "Include the exact store number in the subject line using 'Reset Completion/Compliancy - Store ###'. For C060 Milk reflow issues specifically, use the standard Compass hotline."
  },
  {
    q: "Where do non-Compass vendor and NOK materials go?",
    opts: [
      "Thrown away after the reset is complete",
      "Left on the backroom receiving dock",
      "In the Vestcom boxes on the Compass cart, set aside for vendors",
      "Emailed as a photo to the vendor rep"
    ],
    a: 2,
    exp: "Leave non-Compass POGs, strips, and tags in the Vestcom boxes on the Compass cart. Teams should specifically set these aside so vendors can grab them."
  },
  {
    q: "Looking ahead to P04W2 Fresh Meat Blitz — what's the exception on C563 Convenient Meals?",
    opts: [
      "All stores add 4ft to C563",
      "29 stores decrease C563 by 4ft to add a new Kevin's/Amylu set in C559 Heat & Serve",
      "All stores skip C559 Heat & Serve entirely",
      "29 stores remove the Kevin's/Amylu set from C559"
    ],
    a: 1,
    exp: "29 stores will decrease C563 Convenient Meals by 4ft to make room for a new Kevin's/Amylu set in C559 Heat & Serve. Check the mapping files to see if you're one of the 29."
  }
];

const quizEl = document.getElementById('quiz');
const submitBtn = document.getElementById('submitBtn');
const nameInput = document.getElementById('nameInput');
const progressBar = document.getElementById('progressBar');
const resultCard = document.getElementById('resultCard');
const answers = new Array(questions.length).fill(null);
let locked = false;

questions.forEach((item, i) => {
  const qDiv = document.createElement('div');
  qDiv.className = 'q';
  qDiv.innerHTML = `
    <div class="q-num">Question ${i + 1} of ${questions.length}</div>
    <div class="q-text">${item.q}</div>
    <div class="opts" data-qi="${i}">
      ${item.opts.map((opt, j) => `
        <label class="opt" data-oi="${j}">
          <input type="radio" name="q${i}" value="${j}">
          ${String.fromCharCode(65 + j)}. ${opt}
        </label>
      `).join('')}
    </div>
    <div class="feedback" id="fb-${i}"></div>
  `;
  quizEl.appendChild(qDiv);
});

quizEl.addEventListener('change', (e) => {
  if (locked) return;
  if (e.target.type === 'radio') {
    const qi = parseInt(e.target.name.slice(1));
    answers[qi] = parseInt(e.target.value);
    // Visual selection
    const opts = quizEl.querySelectorAll(`[data-qi="${qi}"] .opt`);
    opts.forEach((o, j) => o.classList.toggle('selected', j === answers[qi]));
    updateProgress();
  }
});

nameInput.addEventListener('input', updateProgress);

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  const pct = (answered / questions.length) * 100;
  progressBar.style.width = pct + '%';
  const allAnswered = answered === questions.length;
  const hasName = nameInput.value.trim().length >= 2;
  submitBtn.disabled = !(allAnswered && hasName) || locked;
}

submitBtn.addEventListener('click', () => {
  if (locked) return;
  locked = true;
  submitBtn.disabled = true;

  // Show overlay with spinner
  const overlay = document.getElementById('overlay');
  const spinner = document.getElementById('spinner');
  const syncMsg = document.getElementById('syncMsg');
  overlay.classList.add('show');
  spinner.classList.remove('hidden');
  syncMsg.textContent = 'Buffering...';
  syncMsg.classList.remove('done');

  // Grade in background
  let score = 0;
  const missed = [];
  questions.forEach((item, i) => {
    const opts = quizEl.querySelectorAll(`[data-qi="${i}"] .opt`);
    const fb = document.getElementById(`fb-${i}`);
    opts.forEach(o => {
      const input = o.querySelector('input');
      input.disabled = true;
    });
    if (answers[i] === item.a) {
      score++;
      opts[answers[i]].classList.add('correct');
      opts[answers[i]].classList.remove('selected');
      fb.className = 'feedback show good';
      fb.textContent = '✓ Correct. ' + item.exp;
    } else {
      missed.push(i + 1);
      if (answers[i] !== null) {
        opts[answers[i]].classList.add('wrong');
        opts[answers[i]].classList.remove('selected');
      }
      opts[item.a].classList.add('correct');
      fb.className = 'feedback show bad';
      fb.textContent = `Correct answer: ${String.fromCharCode(65 + item.a)}. ${item.exp}`;
    }
  });
  quizEl.classList.add('locked');

  const pct = Math.round((score / questions.length) * 100);
  const payload = {
    timestamp: new Date().toISOString(),
    periodWeek: PERIOD_WEEK,
    name: nameInput.value.trim(),
    score: score,
    outOf: questions.length,
    percent: pct,
    missed: missed.join(',')
  };

  // POST (no-cors, fire-and-forget)
  let postSucceeded = true;
  try {
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    }).catch(() => { postSucceeded = false; });
  } catch (err) {
    postSucceeded = false;
  }

  // Overlay choreography: 1.5s spinner → "submitted" → 2s later reveal results
  setTimeout(() => {
    spinner.classList.add('hidden');
    syncMsg.textContent = 'Your results have been submitted.';
    syncMsg.classList.add('done');
  }, 1500);

  setTimeout(() => {
    overlay.classList.remove('show');
    renderResult(score, questions.length, pct, postSucceeded);
    resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 3500);
});

function renderResult(score, total, pct, postOk) {
  document.getElementById('scoreLine').textContent = `${score} / ${total}`;
  document.getElementById('pctLine').textContent = `${pct}%`;
  let verdict = '';
  if (score === 10) verdict = 'Perfect. You were paying attention.';
  else if (score >= 8) verdict = 'Solid. Review the ones you missed.';
  else if (score >= 6) verdict = 'Watch the presentation again — key details were missed.';
  else verdict = 'Go back and rewatch the full presentation before your next shift.';
  if (!postOk) verdict += ' Screenshot this and send to Tyson.';
  document.getElementById('verdictLine').textContent = verdict;
  resultCard.classList.add('show');
}
</script>
</body>
</html>
