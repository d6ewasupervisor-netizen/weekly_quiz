<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P03W1 Weekly Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F0F4F8;color:#1E293B;padding:16px;max-width:640px;margin:0 auto}
h1{font-family:'Space Mono',monospace;color:#1B2A4A;font-size:1.5rem;margin-bottom:4px}
.subtitle{color:#0891B2;font-size:.85rem;margin-bottom:20px;font-family:'Space Mono',monospace}
.progress-bar{width:100%;height:8px;background:#CBD5E1;border-radius:4px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#0891B2,#F59E0B);width:0%;transition:width .3s}
.name-input{width:100%;padding:12px;border:2px solid #CBD5E1;border-radius:8px;font-size:1rem;font-family:'DM Sans',sans-serif;margin-bottom:24px}
.name-input:focus{outline:none;border-color:#0891B2}
.question{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.q-label{font-family:'Space Mono',monospace;font-size:.75rem;color:#0891B2;margin-bottom:6px}
.q-text{font-weight:700;margin-bottom:12px;line-height:1.4}
.option{display:block;width:100%;text-align:left;padding:10px 14px;margin-bottom:6px;border:2px solid #E2E8F0;border-radius:8px;background:#fff;cursor:pointer;font-size:.9rem;font-family:'DM Sans',sans-serif;transition:all .15s}
.option:hover{border-color:#0891B2;background:#ECFEFF}
.option.selected{border-color:#0891B2;background:#ECFEFF;font-weight:700}
.option.correct{border-color:#16A34A;background:#DCFCE7;font-weight:700}
.option.wrong{border-color:#DC2626;background:#FEE2E2;text-decoration:line-through}
.option.show-correct{border-color:#16A34A;background:#DCFCE7;font-weight:700}
.feedback{margin-top:8px;padding:8px 12px;border-radius:6px;font-size:.85rem;display:none}
.feedback.show{display:block}
.feedback.correct-fb{background:#DCFCE7;color:#166534}
.feedback.wrong-fb{background:#FEE2E2;color:#991B1B}
#submitBtn{width:100%;padding:14px;background:#1B2A4A;color:#fff;border:none;border-radius:10px;font-size:1.1rem;font-family:'Space Mono',monospace;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s}
#submitBtn:disabled{background:#94A3B8;cursor:not-allowed}
#submitBtn:not(:disabled):hover{background:#0891B2}
.verdict{margin-top:20px;padding:20px;border-radius:12px;text-align:center;font-family:'Space Mono',monospace;display:none}
.verdict.show{display:block}
.score-num{font-size:2.5rem;font-weight:700;color:#1B2A4A}
.score-msg{margin-top:8px;font-size:.95rem;color:#475569}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.6);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.overlay.show{opacity:1;pointer-events:auto}
.overlay-box{background:#fff;border-radius:16px;padding:40px;text-align:center;font-family:'Space Mono',monospace;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.spinner{width:48px;height:48px;border:4px solid #CBD5E1;border-top-color:#0891B2;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay-text{color:#1B2A4A;font-size:1rem;font-weight:700}
.sync-msg{color:#16A34A;font-size:1rem;font-weight:700;margin-top:12px}
</style>
</head>
<body>
<h1>P03W1 Pop Quiz</h1>
<p class="subtitle">Period 3 Week 1 — 10 Questions</p>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<input type="text" class="name-input" id="nameInput" placeholder="Enter your name">
<div id="quizContainer"></div>
<button id="submitBtn" disabled>Submit Quiz</button>
<div class="verdict" id="verdict"></div>
<div class="overlay" id="overlay"><div class="overlay-box"><div class="spinner" id="spinnerEl"></div><div class="overlay-text" id="overlayText">Buffering...</div></div></div>

<script>
const questions=[
{q:"How many total hours of work are scheduled for P03W1?",opts:["8 hours","12 hours","14 hours","20 hours"],ans:2,exp:"P03W1 has 14 total hours — C138 Feminine Hygiene (6h), C162 Hand Body Face (6h), and C140 Adult Incontinence (2h)."},
{q:"In C138 Feminine Hygiene, where should Stayfree products be positioned after the reflow?",opts:["Top two shelves for premium visibility","Middle shelves at eye level","Bottom or bottom two shelves depending on gondola height","Adjacent to the naturals section"],ans:2,exp:"Move Stayfree down to the bottom or bottom two shelves depending on gondola height and assortment."},
{q:"How should liners be displayed in the C138 Feminine Hygiene update?",opts:["In vertical stacking arrangements","In more horizontal blocks instead of vertical","On endcap displays only","Grouped by brand in diagonal flow"],ans:1,exp:"Liners should be displayed in more horizontal blocks instead of vertical arrangements."},
{q:"From Thursday's test feedback on C138, approximately how many banana boxes of closeout product were found?",opts:["Three","Five","Nine","Fourteen"],ans:2,exp:"The test store produced about nine banana boxes of closeout product. The test store had no clearance tags, so they used the planogram to pull product."},
{q:"In C162 Hand Body Face, where must the new Mixbar line be positioned?",opts:["At the far left of the set","In the middle of the set near K-Beauty lines","On the bottom shelf near value brands","On the endcap nearest checkout"],ans:1,exp:"Mixbar is a new line that will sit in the middle of the set, near the rest of the K-Beauty lines."},
{q:"Where does Neutrogena's new Evenly Clear line sit — and where does it NOT sit?",opts:["With the primary Neutrogena brand block","With the acne sub-block, NOT with the rest of the brand","On a standalone display near the pharmacy","Adjacent to Clean & Clear"],ans:1,exp:"Neutrogena Evenly Clear will sit with the acne sub-block, not with the rest of the standard Neutrogena brand block."},
{q:"There's a known fit issue with Kroger acne medicine from the test feedback. What's the situation?",opts:["Product is too tall for the shelf — needs a shelf move","Product is currently horizontal but intended to be vertical — packaging change not until P9","Product UPCs were printed incorrectly — wait for replacements","Product was discontinued but still showing on the planogram"],ans:1,exp:"Kroger acne medicine is currently running horizontal when it's intended to be vertical, but the packaging change isn't until Period 9 with maintenance scheduled for P3W4."},
{q:"What is the maximum number of shelves allowed on Raid racks, and why?",opts:["Four — any more blocks customer access","Five — six shelves puts it above Kroger's safety requirements","Six — seven shelves exceeds weight limits","Three — standard Kroger fixture height"],ans:1,exp:"Raid racks must have five shelves. Six shelves puts it above Kroger's safety requirements. You have three weeks to get them done."},
{q:"What is the recommendation from Thursday's call regarding Instawork staffing?",opts:["Request different people each week for variety","Request the same people and train them up slowly","Only use Instawork for blitz weeks","Submit Instawork requests by Friday at noon"],ans:1,exp:"The recommendation is to request the same Instawork people and train them up slowly to avoid constantly retraining new bodies — heavy workload is coming."},
{q:"Which brands in C138 Feminine Hygiene have significant UPC changes and discontinued items according to the test feedback?",opts:["Stayfree and Playtex","Always and Tampax","Kotex (UPC/pack changes) and Always (discontinued items)","Summers Eve and L. brand"],ans:2,exp:"There are a lot of UPC changes and pack changes with the Kotex brand, and a lot of discontinued items in the Always brand."}
];

const container=document.getElementById("quizContainer");
const submitBtn=document.getElementById("submitBtn");
const nameInput=document.getElementById("nameInput");
const progressFill=document.getElementById("progressFill");
const verdictDiv=document.getElementById("verdict");
let answers=new Array(questions.length).fill(-1);
let submitted=false;

questions.forEach((q,i)=>{
const div=document.createElement("div");div.className="question";div.id="q"+i;
div.innerHTML=`<div class="q-label">QUESTION ${i+1}</div><div class="q-text">${q.q}</div>`;
q.opts.forEach((opt,j)=>{
const btn=document.createElement("button");btn.className="option";btn.textContent=String.fromCharCode(65+j)+". "+opt;
btn.onclick=()=>{if(submitted)return;answers[i]=j;
div.querySelectorAll(".option").forEach(b=>b.classList.remove("selected"));btn.classList.add("selected");updateProgress();};
div.appendChild(btn);});
const fb=document.createElement("div");fb.className="feedback";fb.id="fb"+i;div.appendChild(fb);
container.appendChild(div);});

function updateProgress(){
const answered=answers.filter(a=>a>=0).length;
progressFill.style.width=(answered/questions.length*100)+"%";
submitBtn.disabled=!(answered===questions.length&&nameInput.value.trim().length>0);}
nameInput.addEventListener("input",updateProgress);

const overlay=document.getElementById("overlay");
const spinnerEl=document.getElementById("spinnerEl");
const overlayText=document.getElementById("overlayText");

submitBtn.onclick=()=>{
if(submitted)return;submitted=true;submitBtn.disabled=true;
overlay.classList.add("show");

let score=0;const missed=[];
questions.forEach((q,i)=>{
const div=document.getElementById("q"+i);const opts=div.querySelectorAll(".option");const fb=document.getElementById("fb"+i);
if(answers[i]===q.ans){score++;opts[answers[i]].classList.add("correct");fb.className="feedback show correct-fb";fb.textContent="✓ Correct!";}
else{opts[answers[i]].classList.add("wrong");opts[q.ans].classList.add("show-correct");fb.className="feedback show wrong-fb";fb.textContent="✗ "+q.exp;
missed.push("Q"+(i+1));}});

const pct=Math.round(score/questions.length*100);
let msg="";
if(score===10)msg="Perfect. You were paying attention.";
else if(score>=8)msg="Solid. Review the ones you missed.";
else if(score>=6)msg="Watch the presentation again — key details were missed.";
else msg="Go back and rewatch the full presentation before your next shift.";

const payload={periodWeek:"P03W1",name:nameInput.value.trim(),score:score,outOf:10,percent:pct,missed:missed.join(", ")||"None"};
fetch("https://script.google.com/macros/s/AKfycbzmcP_mKbuBt-pY1zMGhgrgOWae3uI72PreeTaQTHJDc1Uj4oGq424zRRsdZ8YKo8c1/exec",{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
.catch(()=>{verdictDiv.innerHTML+=`<p style="margin-top:12px;font-size:.8rem;color:#991B1B">Results could not be sent automatically. Screenshot this and send to Tyson.</p>`;});

setTimeout(()=>{
spinnerEl.style.display="none";
overlayText.innerHTML='<div class="sync-msg">Your results have been submitted.</div>';
setTimeout(()=>{
overlay.classList.remove("show");
verdictDiv.className="verdict show";verdictDiv.style.background=score>=8?"#DCFCE7":score>=6?"#FEF3C7":"#FEE2E2";
verdictDiv.innerHTML=`<div class="score-num">${score}/10</div><div class="score-msg">${msg}</div>`;
verdictDiv.scrollIntoView({behavior:"smooth"});
},2000);
},1500);};
</script>
</body>
</html>
